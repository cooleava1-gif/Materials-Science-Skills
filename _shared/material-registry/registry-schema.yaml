# Material Registry Schema — v1
# Defines the structure for every material-system entry in the registry.
# Each entry is a single YAML file under entries/<material-id>.yaml.
#
# Conventions
# - All keys are snake_case.
# - Paths are relative to the repo root, using forward slashes.
# - coverage_tier must be honest: the registry is a discovery layer, not
#   a marketing document.

version: "1.0.0"

# ── Required top-level fields ─────────────────────────────────────────────
required:
  - name
  - id
  - family
  - coverage_tier
  - description
  - skill_mapping

# ── Field definitions ─────────────────────────────────────────────────────
fields:
  name:
    type: string
    description: "Full human-readable material-system name, e.g. 'Waterborne Epoxy Modified Emulsified Asphalt'"
    required: true

  id:
    type: string
    description: "Machine key that matches the manifest domain axis value (e.g. 'asphalt-pavement')"
    required: true

  family:
    type: enum
    values: [civil, polymers, metals, ceramics, functional, nano]
    description: "Material family, matching manifest material_family axis"
    required: true

  coverage_tier:
    type: enum
    values: [full, partial, skeleton, generic]
    description: |-
      How deeply this material system is supported in the skill bundle.
      full     = narrative guide + figure scripts + reviewer criteria + examples
      partial  = narrative guide + at least one of (figure scripts, reviewer criteria)
      skeleton = domain fragment only (trigger routing works, no deep content)
      generic  = family/domain-scoped fallback with no material-specific content
    required: true

  description:
    type: dict
    required: true
    fields:
      summary:
        type: string
        required: true
        description: "One-line summary suitable for tooltips and index displays"
      engineering_problems:
        type: list_of_strings
        required: false
        description: "What engineering/service problems this material system addresses"
      typical_applications:
        type: list_of_strings
        required: false
        description: "Where the material is used in practice"

  properties:
    type: list
    required: false
    description: "Measurable or characterizable properties that researchers typically report"
    items:
      name:
        type: string
        required: true
      id:
        type: string
        required: true
      unit:
        type: string
        required: false
      typical_range:
        type: string
        required: false
        description: "e.g. '0.3–1.5 MPa' or '10–200 μm'"
      test_methods:
        type: list_of_strings
        required: false

  characterization:
    type: list
    required: false
    description: "Characterization / analytical techniques common for this material"
    items:
      method:
        type: string
        required: true
        description: "Technique name, e.g. 'FTIR', 'SEM', 'XRD'"
      purpose:
        type: string
        required: true
        description: "What the technique is used to assess"
      key_features:
        type: list_of_strings
        required: false
        description: "Peak positions, resolution, key markers"
      evidence_tier:
        type: enum
        values: [definitive, strong, supporting, indicative]
        required: false
        description: "How conclusive this technique is for mechanism claims"

  standards:
    type: list
    required: false
    description: "Relevant test standards (ASTM, GB/T, EN, etc.)"
    items:
      standard:
        type: string
        required: true
      equivalent:
        type: string
        required: false
        description: "Equivalent standard in another system (e.g. 'GB/T 5210' ↔ 'ASTM D4541')"
      purpose:
        type: string
        required: true

  figure_archetypes:
    type: list
    required: false
    description: "Typical figure types produced for this material system"
    items:
      id:
        type: string
        required: true
        description: "snake_case archetype key, e.g. 'bonding_strength_bar'"
      description:
        type: string
        required: true
      type:
        type: enum
        required: true
        values:
          - grouped_bar
          - line_plot
          - ftir_overlay
          - xrd_pattern
          - radar_chart
          - heatmap
          - scatter
          - sem_image
          - multi_panel
          - diagram
          - flow_chart
          - dsc_curve
          - tga_curve
          - eis_plot
          - cv_curve
          - stress_strain
          - sintering_curve
          - conductivity_plot
          - particle_size_dist
          - rheology_curve
      figure_script:
        type: string
        required: false
        description: "Path to a figure script that produces this archetype"
      column_roles:
        type: list_of_strings
        required: false
        description: "Semantic roles mapped to columns"
      column_map:
        type: dict
        required: false
        description: "Explicit mapping overrides for figure script"

  narrative:
    type: dict
    required: false
    description: "Writing / narrative resources for this material"
    fields:
      arc:
        type: string
        required: false
        description: "Default narrative arc, e.g. 'Problem → Design → Performance → Mechanism → Boundary'"
      skill_references:
        type: dict
        required: false
        fields:
          domain_fragment:
            type: string
            required: false
            description: "Path to the domain fragment file in materials-research"
          narrative_guide:
            type: string
            required: false
            description: "Path to the narrative guide in materials-writing/references/"
          reviewer_criteria:
            type: string
            required: false
            description: "Path to reviewer criteria in materials-reviewer/references/"

  claim_types:
    type: list
    required: false
    description: "High-frequency claim archetypes and their evidence requirements"
    items:
      type:
        type: string
        required: true
        description: "Claim category, e.g. 'performance_improvement', 'mechanism_explanation'"
      evidence_required:
        type: list_of_strings
        required: false
      common_risks:
        type: list_of_strings
        required: false

  skill_mapping:
    type: dict
    required: true
    description: "Cross-references to concrete files in the skill bundle"
    fields:
      figure_scripts:
        type: list_of_strings
        required: false
        description: "Paths to figure scripts that can produce figures for this material"
      figure_packages:
        type: list_of_strings
        required: false
        description: "Paths to example figure packages"
      data_schemas:
        type: list_of_strings
        required: false
        description: "Paths to data schema / template files"

  cross_references:
    type: dict
    required: false
    description: "Links to related material systems"
    fields:
      related:
        type: list_of_strings
        required: false
        description: "IDs of related material-system entries"
      parent:
        type: string
        required: false
        description: "ID of a broader parent system (e.g. 'civil-generic' for 'asphalt-pavement')"
