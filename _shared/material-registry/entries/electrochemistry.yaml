characterization:
- evidence_tier: strong
  method: Cyclic Voltammetry (CV)
  purpose: Redox behavior, capacitive vs diffusion-controlled contribution, electrochemical reversibility
- evidence_tier: strong
  method: Galvanostatic Charge-Discharge (GCD)
  purpose: Specific capacity, coulombic efficiency, voltage profile, IR drop
- evidence_tier: strong
  method: Electrochemical Impedance Spectroscopy (EIS)
  purpose: Charge-transfer resistance (Rct), diffusion coefficient, equivalent circuit fitting
- evidence_tier: strong
  method: Rate Capability Test
  purpose: Capacity retention at varying C-rates, rate performance ranking
- evidence_tier: strong
  method: Cycling Stability Test
  purpose: Long-term capacity retention, coulombic efficiency over cycles
- evidence_tier: supporting
  method: XRD / Raman
  purpose: Crystal structure confirmation of electrode materials
- evidence_tier: supporting
  method: SEM / TEM
  purpose: Morphology, particle size, SEI layer observation
- evidence_tier: supporting
  method: XPS
  purpose: Surface chemistry, oxidation state, SEI composition
claim_types:
- common_risks:
  - Comparing capacity at different mass loadings
  - No error bars on capacity values
  - Reporting only initial capacity without cycling data
  evidence_required:
  - Mass loading reported (mg/cm²)
  - At least 3 replicate cells
  - Capacity at representative cycle (not just first cycle)
  type: performance_improvement
- common_risks:
  - Attributing enhancement to 'synergistic effect' without direct evidence
  - Claiming 'enhanced conductivity' without EIS data
  evidence_required:
  - EIS before and after modification
  - Structural or morphological evidence linking to performance
  type: mechanism_explanation
- common_risks:
  - Claiming 'excellent stability' after only 100 cycles
  - Ignoring capacity fade rate
  evidence_required:
  - Minimum 500 cycles for Li-ion, 10000 for supercapacitors
  - Coulombic efficiency reported alongside capacity retention
  type: stability_claim
- common_risks:
  - Ragone plot with unrealistic energy density
  - Not specifying whether gravimetric or volumetric
  evidence_required:
  - Gravimetric and/or volumetric clearly stated
  - Power density and energy density at same current density
  type: energy_power_claim
coverage_tier: full
cross_references:
  parent: functional-ceramics
  related:
  - semiconductors
  - nanocomposites
  - sustainability-durability
description:
  engineering_problems:
  - Electrode material design for batteries and supercapacitors
  - Electrolyte optimization for ionic conductivity and stability
  - Interface engineering (SEI, CEI) for long-term cycling
  - Catalyst design for electrochemical reactions (OER, HER, ORR)
  key_methods:
  - CV, GCD, EIS, rate capability, cycling stability
  target_journals:
  - Advanced Energy Materials
  - Energy Storage Materials
  - Journal of Power Sources
  - ACS Energy Letters
  - Electrochimica Acta
