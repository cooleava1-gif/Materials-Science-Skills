characterization:
- evidence_tier: definitive
  method: XRD
  purpose: Phase identification, tetragonality (c/a ratio), crystallite size
- evidence_tier: strong
  method: SEM
  purpose: Grain size, density, domain structure (etching)
- evidence_tier: definitive
  method: Impedance Analyzer
  purpose: Dielectric constant, loss tangent, resonance/anti-resonance frequencies
- evidence_tier: strong
  method: P-E Hysteresis (Ferroelectric Tester)
  purpose: Remnant polarization, coercive field, saturation polarization
- evidence_tier: supporting
  method: Raman Spectroscopy
  purpose: Phase transition detection, local structure, oxygen octahedral distortion
coverage_tier: skeleton
