characterization:
- evidence_tier: definitive
  method: XRD
  purpose: Phase identification, tetragonality (c/a ratio), crystallite size
- evidence_tier: strong
  method: SEM
  purpose: Grain size, density, domain structure (etching)
- evidence_tier: definitive
  method: Impedance Analyzer
  purpose: Dielectric constant, loss tangent, resonance/anti-resonance frequencies
- evidence_tier: strong
  method: P-E Hysteresis (Ferroelectric Tester)
  purpose: Remnant polarization, coercive field, saturation polarization
- evidence_tier: supporting
  method: Raman Spectroscopy
  purpose: Phase transition detection, local structure, oxygen octahedral distortion
coverage_tier: full
cross_references:
  related:
  - structural-ceramics
  - dielectrics-piezoelectrics
description:
  engineering_problems:
  - Piezoelectric coefficient (d₃₃) optimization via composition and poling
  - Dielectric constant and loss control for capacitor and RF applications
  - Temperature stability of dielectric properties
  - Co-firing compatibility in multilayer devices
  summary: Piezoelectric ceramics (PZT, BaTiO₃, KNN), dielectric/ferroelectric ceramics,
    LTCC, and microwave ceramics
  typical_applications:
  - Piezoelectric actuators and sensors
  - Multilayer ceramic capacitors (MLCCs)
  - Microwave dielectric resonators and filters
  - LTCC substrates for electronic packaging
family: ceramics
figure_archetypes:
- description: XRD patterns showing phase evolution with composition
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  id: xrd_pattern
  type: xrd_pattern
  column_roles:
  - angle
  - intensity
  column_map:
    x_values: {"column": "two_theta"}
    y_series:
    - key: Pure asphalt
      column: pure_asphalt
    - key: 5% WER
      column: 5%_wer
    - key: 10% WER
      column: 10%_wer
    - key: 15% WER
      column: 15%_wer
- description: Densification behavior during sintering
  figure_script: skills/materials-figure/scripts/figures4materials/plot_sintering_curve.py
  id: sintering_curve
  type: sintering_curve
  column_roles:
  - temperature
  - shrinkage
  column_map:
    x_values: {"column": "temperature"}
    y1_values: {"column": "relative_density_pct"}
    y2_values: {"column": "open_porosity_pct"}
- description: Impedance Nyquist plot showing grain and grain boundary contributions
  figure_script: skills/materials-figure/scripts/figures4materials/plot_eis.py
  id: impedance_nyquist
  type: eis_plot
  column_roles:
  - real
  - imaginary
  column_map:
    frequency: {"column": "log_freq_hz"}
    z_real: {"column": "z_real"}
    z_imag: {"column": "z_imag"}
id: functional-ceramics
name: Functional Ceramics (Piezoelectric, Dielectric)
narrative:
  arc: Composition → Processing → Structure → Dielectric/Piezoelectric Properties
    → Device Performance
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/functional-ceramics.md
    narrative_guide: skills/materials-writing/references/functional-ceramics-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/ceramics-reviewer-criteria.md
properties:
- id: dielectric_constant
  name: Dielectric Constant
  test_methods:
  - ASTM D150 / IEC 60250
  typical_range: 10–5000
  unit: dimensionless
- id: loss_tangent
  name: Dielectric Loss (tan δ)
  test_methods:
  - ASTM D150 / IEC 60250
  typical_range: 0.0001–0.05
  unit: dimensionless
- id: piezoelectric_coefficient
  name: Piezoelectric Coefficient (d₃₃)
  test_methods:
  - IEEE Std 176
  typical_range: 10–600
  unit: pC/N
- id: remnant_polarization
  name: Remnant Polarization (Pr)
  test_methods:
  - Sawyer-Tower method
  typical_range: 1–40
  unit: µC/cm²
- id: coercive_field
  name: Coercive Field (Ec)
  test_methods:
  - Sawyer-Tower method
  typical_range: 0.5–5
  unit: kV/mm
skill_mapping:
  data_schemas:
  - skills/materials-figure/scripts/figures4materials/data/functional_impedance.csv
  - skills/materials-figure/scripts/figures4materials/data/functional_pe_loop.csv
  - skills/materials-figure/scripts/figures4materials/data/xrd_pattern.csv
  - skills/materials-figure/scripts/figures4materials/data/sintering_curve.csv
  figure_packages:
  - skills/materials-figure/examples/figure-packages/ceramics-sintering-optimization
  - skills/materials-figure/examples/figure-packages/ceramics-xrd-phase-identification
  figure_scripts:
  - skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  - skills/materials-figure/scripts/figures4materials/plot_sintering_curve.py
  - skills/materials-figure/scripts/figures4materials/plot_eis.py
standards:
- purpose: Permittivity and dielectric dissipation factor determined under AC voltage
  standard: ASTM D150
- purpose: Measurement standards for piezoelectric strain constant and coupling coefficients
  standard: IEEE Std 176
- purpose: Recommended determination methods of permittivity and dielectric loss
  standard: IEC 60250
