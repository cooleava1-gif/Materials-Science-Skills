description:
  engineering_problems:
  - Piezoelectric coefficient (d₃₃) optimization via composition and poling
  - Dielectric constant and loss control for capacitor and RF applications
  - Temperature stability of dielectric properties
  - Co-firing compatibility in multilayer devices
  summary: Piezoelectric ceramics (PZT, BaTiO₃, KNN), dielectric/ferroelectric ceramics,
    LTCC, and microwave ceramics
  typical_applications:
  - Piezoelectric actuators and sensors
  - Multilayer ceramic capacitors (MLCCs)
  - Microwave dielectric resonators and filters
  - LTCC substrates for electronic packaging
