characterization:
- evidence_tier: definitive
  method: TEM
  purpose: Filler dispersion, exfoliation degree (for layered fillers), interphase
- evidence_tier: strong
  method: SEM
  purpose: Fracture surface, filler distribution at micro-scale
- evidence_tier: strong
  method: Rheology
  purpose: Melt rheology for dispersion assessment (percolation threshold)
- evidence_tier: strong
  method: DMA
  purpose: Storage modulus enhancement, Tg shift, filler-matrix interaction
coverage_tier: full
cross_references:
  related:
  - nanoparticles
  - 2d-materials
  - polymer-composites
description:
  engineering_problems:
  - Filler dispersion uniformity in matrix (agglomeration prevention)
  - Interface/interphase design for load transfer
  - Property enhancement at low filler loading (< 5 wt%)
  - Processing-structure-property relationships
  summary: Polymer nanocomposites, ceramic nanocomposites, and metal matrix nanocomposites
    with nano-filler reinforcement
  typical_applications:
  - Lightweight structural nanocomposites
  - Conductive nanocomposites for EMI shielding
  - Flame retardant nanocomposites
  - Barrier films and packaging
family: nano
figure_archetypes:
- id: xrd_pattern
  description: X-ray diffraction pattern for phase identification
  required_columns:
  - two_theta
  - neat_matrix
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/nanocomposites_xrd.csv
  column_map:
    x_values:
      column: two_theta
    y_series:
    - key: Neat Matrix
      column: neat_matrix
    - key: 0.5Wt Filler
      column: 0.5wt_filler
    - key: 1.0Wt Filler
      column: 1.0wt_filler
- id: trend_curve
  description: Tensile strength trend with uncertainty
  required_columns:
  - filler_loading_wt
  - tensile_strength_MPa
  - tensile_strength_MPa_std
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/nanocomposites_trend_curve.csv
  column_map:
    x_values:
      column: filler_loading_wt
    y_values:
      column: tensile_strength_MPa
    y_errors:
      column: tensile_strength_MPa_std
id: nanocomposites
name: Nanocomposites and Nano-Filled Systems
narrative:
  arc: Matrix + Filler → Dispersion → Interface → Properties → Application
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/nanocomposites.md
    narrative_guide: skills/materials-writing/references/nanocomposites-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/nanocomposites-reviewer-criteria.md
skill_mapping:
  data_schemas:
  - skills/materials-figure/scripts/figures4materials/data/nanocomposites_xrd.csv
  - skills/materials-figure/scripts/figures4materials/data/nanocomposites_trend_curve.csv
  figure_packages:
  - skills/materials-figure/examples/figure-packages/nanocomposites-demo
  figure_scripts:
  - skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  - skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
