characterization:
- evidence_tier: definitive
  method: TEM
  purpose: Filler dispersion, exfoliation degree (for layered fillers), interphase
- evidence_tier: strong
  method: SEM
  purpose: Fracture surface, filler distribution at micro-scale
- evidence_tier: strong
  method: Rheology
  purpose: Melt rheology for dispersion assessment (percolation threshold)
- evidence_tier: strong
  method: DMA
  purpose: Storage modulus enhancement, Tg shift, filler-matrix interaction
coverage_tier: partial
cross_references:
  related:
  - nanoparticles
  - 2d-materials
  - polymer-composites
description:
  engineering_problems:
  - Filler dispersion uniformity in matrix (agglomeration prevention)
  - Interface/interphase design for load transfer
  - Property enhancement at low filler loading (< 5 wt%)
  - Processing-structure-property relationships
  summary: Polymer nanocomposites, ceramic nanocomposites, and metal matrix nanocomposites
    with nano-filler reinforcement
  typical_applications:
  - Lightweight structural nanocomposites
  - Conductive nanocomposites for EMI shielding
  - Flame retardant nanocomposites
  - Barrier films and packaging
family: nano
