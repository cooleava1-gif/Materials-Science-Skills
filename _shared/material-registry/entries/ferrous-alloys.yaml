  - skills/materials-figure/scripts/figures4materials/plot_polarization_curve.py
  - skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
standards:
- purpose: Tension testing of metallic materials at room temperature
  standard: ASTM E8 / E8M
- purpose: Metallic materials tensile testing method at room temperature
  standard: ISO 6892-1
- purpose: Notched bar impact testing of metallic materials (Charpy)
  standard: ASTM E23 / ISO 148-1
- purpose: Vickers hardness testing of metallic materials
  standard: ASTM E92 / ISO 6507-1
