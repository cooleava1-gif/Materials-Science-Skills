characterization:
- evidence_tier: definitive
  method: TEM/HRTEM
  purpose: Particle size, shape, crystallinity, lattice fringe analysis
- evidence_tier: strong
  method: DLS
  purpose: Hydrodynamic diameter and size distribution in suspension
- evidence_tier: strong
  method: XRD
  purpose: Crystalline phase, Scherrer crystallite size
- evidence_tier: strong
  method: UV-Vis
  purpose: Surface plasmon resonance (SPR) peak for metallic NPs, bandgap for QDs
- evidence_tier: strong
  method: Zeta Potential
  purpose: Surface charge and colloidal stability assessment
