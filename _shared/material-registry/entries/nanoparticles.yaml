characterization:
- evidence_tier: definitive
  method: TEM/HRTEM
  purpose: Particle size, shape, crystallinity, lattice fringe analysis
- evidence_tier: strong
  method: DLS
  purpose: Hydrodynamic diameter and size distribution in suspension
- evidence_tier: strong
  method: XRD
  purpose: Crystalline phase, Scherrer crystallite size
- evidence_tier: strong
  method: UV-Vis
  purpose: Surface plasmon resonance (SPR) peak for metallic NPs, bandgap for QDs
- evidence_tier: strong
  method: Zeta Potential
  purpose: Surface charge and colloidal stability assessment
coverage_tier: full
cross_references:
  related:
  - nanocomposites
  - 2d-materials
description:
  engineering_problems:
  - Size-controlled synthesis with narrow distribution
  - Colloidal stability and surface functionalization
  - Toxicity and environmental impact assessment
  - Scalable manufacturing from lab to industry
  summary: Metallic nanoparticles (Au, Ag), metal oxide nanoparticles, quantum dots,
    and nanopowders for various applications
  typical_applications:
  - Catalysis and photocatalysis
  - Biomedical imaging and drug delivery
  - Antimicrobial coatings
  - Nano-enhanced composites
family: nano
figure_archetypes:
- id: xrd_pattern
  description: X-ray diffraction pattern for phase identification
  required_columns:
  - two_theta
  - gold_np
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/nanoparticles_xrd.csv
  column_map:
    x_values:
      column: two_theta
    y_series:
    - key: Gold Np
      column: gold_np
    - key: Silver Np
      column: silver_np
- id: trend_curve
  description: Average particle diameter trend with uncertainty
  required_columns:
  - reaction_time_h
  - mean_diameter_nm
  - mean_diameter_nm_std
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/nanoparticles_trend_curve.csv
  column_map:
    x_values:
      column: reaction_time_h
    y_values:
      column: mean_diameter_nm
    y_errors:
      column: mean_diameter_nm_std
id: nanoparticles
name: Nanoparticles and Quantum Dots
narrative:
  arc: Precursor → Synthesis → Size/Shape Control → Surface → Properties → Application
    → Toxicity
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/nanoparticles.md
    narrative_guide: skills/materials-writing/references/nanoparticles-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/nanoparticles-reviewer-criteria.md
skill_mapping:
  data_schemas:
  - skills/materials-figure/scripts/figures4materials/data/nanoparticles_xrd.csv
  - skills/materials-figure/scripts/figures4materials/data/nanoparticles_trend_curve.csv
  figure_packages:
  - skills/materials-figure/examples/figure-packages/nanoparticles-demo
  figure_scripts:
  - skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  - skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
