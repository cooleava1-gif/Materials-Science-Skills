version: "1.1.0"

always_load:
  - static/core/contract.md
  - ../_shared/core/direction-profile.md
  - ../_shared/core/stance.md
  - ../_shared/core/evidence-contract.md
  - ../_shared/core/claim-strength-ladder.md
  - ../_shared/core/terminology-ledger.md
  - ../_shared/core/ethics.md
  - ../_shared/paper-production/weakness-routing.md
  - static/core/polishing-contract.md
  - static/core/workflow.md

axes:
  section:
    default: generic
    values:
      abstract:
        path: references/abstract.md
        triggers: ["abstract", "摘要"]
      introduction:
        path: references/introduction.md
        triggers: ["introduction", "intro", "引言", "前言"]
      results-discussion:
        path: references/results-discussion.md
        triggers: ["results", "discussion", "results and discussion", "结果", "讨论"]
      conclusions:
        path: references/conclusions.md
        triggers: ["conclusion", "conclusions", "closing paragraph", "结论"]
      cover-letter:
        path: references/cover-letter.md
        triggers: ["cover letter", "submission letter", "投稿信", "cover"]
      generic:
        path: references/style-guardrails.md
        triggers: ["polish", "rewrite", "translate", "润色", "翻译", "改写"]
      claim-strength:
        path: ../_shared/core/claim-strength-ladder.md
        triggers: ["overclaim", "claim", "causality", "novelty", "strengthen", "弱化", "因果", "创新性"]

  journal_family:
    default: materials
    values:
      materials:
        path: references/style-guardrails.md
        triggers: ["CBM", "JBE", "CSCM", "materials", "construction materials", "土木材料"]
      pavement:
        path: references/pavement-language.md
        triggers: ["RMPD", "IJPE", "JRE", "pavement", "asphalt", "路面", "沥青"]
      cement-concrete:
        path: references/cement-concrete-language.md
        triggers: ["CCC", "CCR", "cement", "concrete", "水泥", "混凝土"]
      polymers:
        path: references/polymers-language.md
        triggers: ["polymer", "thermoplastic", "thermoset", "rubber", "composite", "高分子", "聚合物", "橡胶"]
      ceramics:
        path: references/ceramics-language.md
        triggers: ["ceramic", "sintering", "alumina", "zirconia", "carbide", "陶瓷", "烧结"]
      metals:
        path: references/metals-language.md
        triggers: ["metal", "alloy", "steel", "aluminum", "titanium", "金属", "合金", "钢"]
      insulation:
        path: references/insulation-language.md
        triggers: ["thermal insulation", "aerogel", "foam", "insulation", "隔热", "保温"]
      nano:
        path: references/nano-language.md
        triggers: ["nano", "nanoparticle", "nanotube", "graphene", "2D material", "quantum dot", "纳米", "纳米材料"]
      functional:
        path: references/functional-language.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "ferroelectric", "photonic", "半导体", "介电", "压电"]

  language_mode:
    default: rulebook
    values:
      rulebook:
        path: references/language-rulebook.md
        triggers: ["language rules", "SCI style", "academic style", "语言规则", "写作规则"]
      chinese-to-english:
        path: references/chinese-to-english-patterns.md
        triggers: ["Chinese to English", "translate", "中译英", "中文润色"]
      claim-strength:
        path: ../_shared/core/claim-strength-ladder.md
        triggers: ["claim strength", "hedging", "causality", "overclaim", "语气", "强度"]
  material_family:
    detect: "Which materials family is central?"
    default: neutral
    values:
      neutral:
        path: ../_shared/core/direction-profile.md
        triggers: ["neutral family", "profile family fallback", "no saved family"]
      civil:
        path: ../materials-research/static/fragments/domain/civil-family.md
        triggers: ["civil", "construction", "building", "pavement", "土木", "建筑"]
      polymers:
        path: ../materials-research/static/fragments/domain/polymers-family.md
        triggers: ["polymer", "resin", "rubber", "epoxy", "高分子", "聚合物", "树脂"]
      metals:
        path: ../materials-research/static/fragments/domain/metals-family.md
        triggers: ["metal", "alloy", "steel", "aluminum", "金属", "合金", "钢"]
      ceramics:
        path: ../materials-research/static/fragments/domain/ceramics-family.md
        triggers: ["ceramic", "porcelain", "refractory", "陶瓷", "耐火"]
      functional:
        path: ../materials-research/static/fragments/domain/functional-family.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "半导体", "介电", "压电"]
      nano:
        path: ../materials-research/static/fragments/domain/nano-family.md
        triggers: ["nano", "nanoparticle", "2D material", "纳米", "纳米材料"]

  domain:
    detect: "Which material domain does the manuscript target?"
    default: general
    values:
      general:
        path: ../_shared/core/direction-profile.md
        triggers: ["general fallback", "profile fallback", "neutral routing"]
      civil:
        path: static/fragments/domain/civil.md
        triggers: ["civil", "asphalt", "cement", "concrete", "pavement", "construction", "土木", "建筑", "道路"]
      polymers:
        path: static/fragments/domain/polymers.md
        triggers: ["polymer", "resin", "rubber", "epoxy", "thermoplastic", "高分子", "聚合物"]
      metals:
        path: static/fragments/domain/metals.md
        triggers: ["metal", "alloy", "steel", "ferrous", "合金", "钢"]
      ceramics:
        path: static/fragments/domain/ceramics.md
        triggers: ["ceramic", "porcelain", "refractory", "sintering", "陶瓷", "耐火"]
      functional:
        path: static/fragments/domain/functional.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "optoelectronic", "半导体", "介电"]
      nano:
        path: static/fragments/domain/nano.md
        triggers: ["nano", "nanoparticle", "2D material", "graphene", "纳米"]

references:
  on_demand:
    journal-cbm-facts:
      path: ../_shared/journal-formats/cbm.md
      when: "The target journal is CBM, Construction and Building Materials."
    journal-ccc-facts:
      path: ../_shared/journal-formats/ccc.md
      when: "The target journal is CCC, Cement and Concrete Composites."
    journal-rmpd-facts:
      path: ../_shared/journal-formats/rmpd.md
      when: "The target journal is RMPD or IJPE."
    journal-jbe-facts:
      path: ../_shared/journal-formats/jbe.md
      when: "The target journal is JBE, Journal of Building Engineering."
    en-rules:
      path: static/fragments/language/en.md
      when: "The user needs English polishing rules."
    zh-to-en-rules:
      path: static/fragments/language/zh-to-en.md
      when: "The user needs Chinese-to-English rules."
    research-rules:
      path: static/fragments/paper_type/research.md
      when: "The user writes a research paper."
    review-rules:
      path: static/fragments/paper_type/review.md
      when: "The user writes a review paper or the target journal is JBE, Journal of Building Engineering."
    claim-strength-local:
      path: references/claim-strength-ladder.md
      when: "The user needs a local copy of the claim strength ladder."
    hourglass-structure:
      path: references/hourglass-structure.md
      when: "The user needs to verify section structure, information flow, or paragraph order."
    vocabulary-upgrade:
      path: references/vocabulary-upgrade.md
      when: "The user needs to upgrade weak words, calibrate verbs to evidence level, or replace vague adjectives."
    citation-integrity:
      path: references/citation-integrity.md
      when: "The user needs to audit citations, verify attribution, or check citation density."
    british-english:
      path: references/british-english.md
      when: "The user needs British English spelling, journal-specific English requirements, or consistency checks."
    proofreading:
      path: references/proofreading.md
      when: "The user needs final mechanical checks, proofreading, or pre-submission polish."
assets:
  - assets
scripts:
  - scripts
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract
handoffs:
  provides: {}
  consumes: []
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
