version: "1.0.0"

always_load:
  - static/core/contract.md
  - ../_shared/core/direction-profile.md
  - static/core/pptx-contract.md
  - static/core/workflow.md

axes:
  deck_type:
    default: research-report
    values:
      paper-reading:
        path: references/deck-structures.md
        triggers: ["paper", "journal club", "literature", "文献汇报", "精读"]
      research-report:
        path: references/deck-structures.md
        triggers: ["group meeting", "report", "thesis", "组会", "汇报", "开题"]
      mechanism:
        path: references/visual-style.md
        triggers: ["mechanism", "FTIR", "SEM", "fluorescence", "机理", "显微"]
      review-talk:
        path: references/deck-structures.md
        triggers: ["review", "综述", "research progress", "研究进展"]
  domain:
    detect: "Which material domain does the PPTX target?"
    default: general
    values:
      general:
        path: ../_shared/core/direction-profile.md
        triggers: ["general fallback", "profile fallback", "neutral routing"]
      civil:
        path: static/fragments/domain/domain-context.md
        triggers: ["civil", "asphalt", "cement", "concrete", "pavement", "construction", "土木", "建筑"]
      polymers:
        path: static/fragments/domain/domain-context.md
        triggers: ["polymer", "resin", "rubber", "thermoplastic", "高分子"]
      metals:
        path: static/fragments/domain/domain-context.md
        triggers: ["metal", "alloy", "steel", "金属", "合金"]
      ceramics:
        path: static/fragments/domain/domain-context.md
        triggers: ["ceramic", "sintering", "陶瓷"]
      functional:
        path: static/fragments/domain/domain-context.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "半导体"]
      nano:
        path: static/fragments/domain/domain-context.md
        triggers: ["nano", "nanoparticle", "2D material", "纳米"]
  source_type:
    default: outline
    values:
      outline:
        path: references/pptx-generation.md
        triggers: ["outline", "markdown", ".md", "大纲"]
      json:
        path: references/pptx-generation.md
        triggers: ["json", ".json", "JSON outline"]
      data:
        path: references/pptx-generation.md
        triggers: ["data", "csv", "figure", "数据", "图表"]
  template:
    default: academic
    values:
      academic:
        path: static/fragments/template/academic.md
        triggers: ["academic", "conference talk", "group meeting", "conference", "学术", "组会", "会议"]
      defense:
        path: static/fragments/template/defense.md
        triggers: ["defense", "thesis", "dissertation", "答辩", "毕业论文"]
      journal-club:
        path: static/fragments/template/journal-club.md
        triggers: ["journal club", "literature", "paper reading", "文献汇报", "精读"]

references: {}

assets:
  - assets
scripts:
  - scripts
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract

handoffs:
  provides: {}
  consumes:
    - handoff: figure-handoff
      from: materials-figure
      optional: true
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
