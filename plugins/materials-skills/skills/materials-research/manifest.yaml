references:
  on_demand:
    asphalt-waterborne-epoxy:
      path: references/asphalt-waterborne-epoxy.md
      when: The task concerns waterborne epoxy modified emulsified asphalt, bonding,
        interface mechanism, or asphalt emulsion test design.
    journal-shortlist:
      path: references/journal-shortlist.md
      when: The user asks where to submit, how to compare journals, or how to position
        a manuscript across materials journals.
    reviewer-risk-checklist:
      path: references/reviewer-risk-checklist.md
      when: The user asks for pre-submission review, desk-reject risk, reviewer simulation,
        or claim-evidence audit.
    output-templates:
      path: references/output-templates.md
      when: The user asks for abstract, highlights, title, cover letter, graphical
        abstract, PPT, or structured manuscript templates.
    data-to-manuscript:
      path: references/data-to-manuscript.md
      when: The user provides data, tables, or result descriptions and asks for interpretation,
        figures, result paragraphs, or claim-evidence mapping.
    statistical-methods:
      path: references/statistical-methods.md
      when: The task involves significance, ANOVA, t tests, uncertainty, replicate
        count, dosage optimization, or statistical wording.
    test-standards-mapping:
      path: references/test-standards-mapping.md
      when: The task involves ASTM, EN, JTG, GB, AASHTO, RILEM, test standards, or
        method comparability.
    standards-mapping:
      path: references/standards-mapping.md
      when: The task requires converting GB/T, JTG, or JTJ methods into ASTM/EN/ISO/AASHTO-aware
        manuscript language.
    characterization-guide:
      path: references/characterization-guide.md
      when: The task asks how to perform, report, or interpret FTIR, SEM, fluorescence
        microscopy, XRD, TG/DTG, DSC, AFM, or rheology tests.
    sustainability-claims-guide:
      path: references/sustainability-claims-guide.md
      when: The task involves sustainability, low carbon, LCA, environmental impact,
        recycled materials, waste utilization, or service-life environmental claims.
    ceramics-guide:
      path: references/ceramics-guide.md
      when: The task involves ceramics characterization, mechanical testing, or sintering.
    thermal-insulation-guide:
      path: references/thermal-insulation-guide.md
      when: The task involves thermal conductivity measurement, insulation testing,
        or hygrothermal aging.
    ceramics-narrative:
      path: ../materials-writing/references/ceramics-narrative.md
      when: The user is writing a ceramics manuscript.
    insulation-narrative:
      path: ../materials-writing/references/insulation-narrative.md
      when: The user is writing a thermal insulation manuscript.
    reviewer-ceramics-criteria:
      path: ../materials-reviewer/references/ceramics-reviewer-criteria.md
      when: The user needs reviewer criteria for ceramics.
    reviewer-insulation-criteria:
      path: ../materials-reviewer/references/insulation-reviewer-criteria.md
      when: The user needs reviewer criteria for thermal insulation.
    thesis-timeline:
      path: references/thesis-timeline.md
      when: The user asks for master's thesis planning, semester roadmap, paper timeline,
        weekly research plan, or how to progress from review to experiment to submission.
    companion-modules:
      path: references/companion-modules.md
      when: The task should be handed off to materials-reader, materials-citation,
        materials-writing, materials-polishing, materials-response, materials-reviewer,
        materials-paper2ppt, materials-pptx, materials-figure, or materials-doe.
    paper-production-orchestrator:
      path: references/paper-production-orchestrator.md
      when: The user asks for WER-EA mini-review production, experimental manuscript
        planning, paper gates, weakness routing, reviewer-risk loops, or end-to-end
        paper-production control.
    shared-weakness-routing:
      path: ../_shared/paper-production/weakness-routing.md
      when: A reviewer comment, self-review issue, or paper gate failure must be routed
        to a companion skill.
    pressure-test-suite:
      path: references/pressure-test-suite.md
      when: The task asks for pressure tests, failure modes, regression coverage,
        skill validation, or reviewer-safe behavior checks across modules.
    journal-cbm-facts:
      path: ../_shared/journal-formats/cbm.md
      when: The target journal is CBM, Construction and Building Materials, or the
        user asks about CBM formatting requirements.
    journal-ccc-facts:
      path: ../_shared/journal-formats/ccc.md
      when: The target journal is CCC, Cement and Concrete Composites, or the user
        asks about CCC formatting requirements.
    journal-rmpd-facts:
      path: ../_shared/journal-formats/rmpd.md
      when: The target journal is RMPD, IJPE, Road Materials and Pavement Design,
        or International Journal of Pavement Engineering.
    journal-jbe-facts:
      path: ../_shared/journal-formats/jbe.md
      when: The target journal is JBE, Journal of Building Engineering, or the user
        asks about JBE formatting requirements.
companion_skills:
  reader: materials-reader
  citation: materials-citation
  writing: materials-writing
  polishing: materials-polishing
  response: materials-response
  reviewer: materials-reviewer
  paper2ppt: materials-paper2ppt
  pptx: materials-pptx
  figure: materials-figure
  data: materials-data
  doe: materials-doe
assets: []
scripts:
- scripts
tests:
- tests
quality_gates:
- release gate must report no issues for this skill
- claims must stay inside the skill evidence contract
handoffs:
  provides:
    gate-report:
      description: Stage gate report with weakness routing
      contract: ../../_shared/contracts/gate-report.yaml
      version: '1.0'
  consumes:
  - handoff: citation-handoff
    from: materials-citation
    optional: false
  - handoff: reader-package
    from: materials-reader
    optional: false
  - handoff: figure-handoff
    from: materials-figure
    optional: false
  - handoff: data-package
    from: materials-data
    optional: false
  - handoff: doe-handoff
    from: materials-doe
    optional: true
  - handoff: gate-report
    from: materials-research
    optional: true
release_checks:
- scripts/run_release_checks.py --json
- scripts/check_skill_architecture.py --json
