version: 1.1.0
always_load:
- static/core/contract.md
- ../_shared/core/direction-profile.md
- ../_shared/core/stance.md
- ../_shared/core/evidence-contract.md
- ../_shared/paper-production/weakness-routing.md
- static/core/workflow.md
axes:
  task:
    detect: What deliverable does the user want?
    default: manuscript-writing
    values:
      research-positioning:
        path: static/fragments/task/research-positioning.md
        triggers:
        - research topic
        - novelty
        - gap
        - paper angle
        - research question
        - 选题
        - 创新点
        - 研究问题
        - 论文角度
        - 研究方向
      reading:
        path: static/fragments/task/reading.md
        triggers:
        - read paper
        - translate paper
        - paper notes
        - 精读
        - 文献阅读
        - 文献翻译
      literature-review:
        path: static/fragments/task/literature-review.md
        triggers:
        - review
        - 综述
        - literature review
        - research progress
        - 研究进展
      citation-mapping:
        path: static/fragments/task/citation-mapping.md
        triggers:
        - citation
        - reference
        - citation matrix
        - literature search
        - claim-source
        - 引用
        - 参考文献
        - 文献检索
        - 引用矩阵
        - 证据映射
      manuscript-writing:
        path: static/fragments/task/manuscript-writing.md
        triggers:
        - abstract
        - introduction
        - discussion
        - paper
        - manuscript
        - 摘要
        - 引言
        - 讨论
        - 论文写作
      journal-targeting:
        path: static/fragments/task/journal-targeting.md
        triggers:
        - journal
        - submission
        - target
        - 投稿
        - 选刊
        - 期刊
      experiment-design:
        path: static/fragments/task/experiment-design.md
        triggers:
        - experiment
        - test matrix
        - 实验方案
        - 实验矩阵
        - 试验设计
