    detect: Whether the user needs one output, a full paper-production pipeline, or
      a reviewer-risk loop.
    default: single-task
    values:
      single-task:
        path: static/core/workflow.md
        triggers:
        - single task
        - quick
        - one section
        - one table
      paper-production:
        path: references/paper-production-orchestrator.md
        triggers:
        - paper production
        - full workflow
        - mini-review
        - experimental manuscript
        - 论文生产
