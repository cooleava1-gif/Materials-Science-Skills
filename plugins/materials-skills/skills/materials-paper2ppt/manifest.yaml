version: "1.0.0"

always_load:
  - static/core/contract.md
  - static/core/ppt-contract.md
  - static/core/workflow.md

axes:
  deck_type:
    default: journal-club
    values:
      journal-club:
        path: references/journal-club-deck.md
        triggers: ["journal club", "文献汇报", "组会", "paper presentation"]
      project-report:
        path: references/project-report-deck.md
        triggers: ["project", "thesis", "开题", "课题汇报", "组会汇报"]
      review-talk:
        path: references/review-talk-deck.md
        triggers: ["review", "综述", "research progress", "研究进展"]
  paper_type:
    default: experimental
    values:
      experimental:
        path: references/materials-experiment-arc.md
        triggers: ["experiment", "results", "实验", "结果"]
      review:
        path: references/review-talk-deck.md
        triggers: ["review", "综述"]
      mechanism:
        path: references/mechanism-deck.md
        triggers: ["mechanism", "FTIR", "SEM", "机理"]
      pptx-ready:
        path: references/pptx-handoff.md
        triggers: ["PPTX", ".pptx", "PowerPoint", "生成PPT", "制作PPT"]
  task:
    default: slide-outline
    values:
      slide-outline:
        path: static/fragments/task/slide-outline.md
        triggers: ["outline", "slide outline", "PPT outline", "presentation outline", "大纲", "PPT大纲"]
      pptx-deck:
        path: static/fragments/task/pptx-deck.md
        triggers: ["PPTX", ".pptx", "PowerPoint", "real pptx", "生成PPT", "制作PPT"]
  material_family:
    detect: "Which materials family is central?"
    default: general
    values:
      civil:
        path: ../materials-research/static/fragments/domain/civil-family.md
        triggers: ["civil", "construction", "building", "pavement", "土木", "建筑"]
      polymers:
        path: ../materials-research/static/fragments/domain/polymers-family.md
        triggers: ["polymer", "resin", "rubber", "epoxy", "高分子", "聚合物", "树脂"]
      metals:
        path: ../materials-research/static/fragments/domain/metals-family.md
        triggers: ["metal", "alloy", "steel", "aluminum", "金属", "合金", "钢"]
      ceramics:
        path: ../materials-research/static/fragments/domain/ceramics-family.md
        triggers: ["ceramic", "porcelain", "refractory", "陶瓷", "耐火"]
      functional:
        path: ../materials-research/static/fragments/domain/functional-family.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "半导体", "介电", "压电"]
      nano:
        path: ../materials-research/static/fragments/domain/nano-family.md
        triggers: ["nano", "nanoparticle", "2D material", "纳米", "纳米材料"]
      general:
        path: ../materials-research/static/fragments/domain/general-materials.md
        triggers: ["materials", "通用"]

assets:
  - assets
scripts:
  - scripts
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract

handoffs:
  provides: {}
  consumes:
    - handoff: figure-handoff
      from: materials-figure
      optional: true
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
