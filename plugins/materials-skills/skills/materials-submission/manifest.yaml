version: "1.1.0"
status: beta

always_load:
  - static/core/contract.md
  - static/core/workflow.md
  - static/core/output-format.md
  - ../_shared/core/direction-profile.md

axes:
  task:
    detect: "What submission deliverable does the user want?"
    default: full-package
    values:
      full-package:
        path: static/core/workflow.md
        triggers: ["submission package", "投稿包"]
      cover-letter-only:
        path: references/cover-letter-strategy.md
        triggers: ["cover letter", "投稿信", "editor letter"]
      highlights-only:
        path: references/highlights-strategy.md
        triggers: ["highlights", "亮点", "key points"]
      checklist-only:
        path: references/submission-package-protocol.md
        triggers: ["submission checklist", "投稿清单", "submission readiness"]
  journal:
    detect: "Which target journal is named?"
    default: generic
    values:
      generic:
        path: ../_shared/core/direction-profile.md
        triggers: ["generic journal", "no journal", "general fallback"]
      cbm:
        path: ../../_shared/journal-templates/cbm.md
        triggers: ["CBM", "Construction and Building Materials"]
      ccc:
        path: ../../_shared/journal-templates/ccc.md
        triggers: ["CCC", "Cement and Concrete Composites"]
      rmpd:
        path: ../../_shared/journal-templates/rmpd.md
        triggers: ["RMPD", "Road Materials and Pavement Design"]
      jbe:
        path: ../../_shared/journal-templates/jbe.md
        triggers: ["JBE", "Journal of Building Engineering"]
      building-environment:
        path: ../../_shared/journal-templates/building-environment.md
        triggers: ["Building and Environment", "BAE", "building environment"]
      energy-buildings:
        path: ../../_shared/journal-templates/energy-buildings.md
        triggers: ["Energy and Buildings", "ENB", "energy buildings"]
      ceramics-international:
        path: ../../_shared/journal-templates/ceramics-international.md
        triggers: ["Ceramics International", "Ceram. Int.", "ceramic int."]
      acta-materialia:
        path: ../../_shared/journal-templates/acta-materialia.md
        triggers: ["Acta Materialia", "Acta Mater."]
      jmca:
        path: ../../_shared/journal-templates/jmca.md
        triggers: ["JMCA", "Journal of Materials Chemistry A", "J. Mater. Chem. A"]
      nature-materials:
        path: ../../_shared/journal-templates/nature-materials.md
        triggers: ["Nature Materials", "Nat. Mater."]
  article_type:
    detect: "Which article type is being submitted?"
    default: research-article
    values:
      research-article:
        path: static/core/workflow.md
        triggers: ["research article", "original research", "研究论文"]
      review-article:
        path: static/core/workflow.md
        triggers: ["review", "综述", "review article"]
      short-communication:
        path: static/core/workflow.md
        triggers: ["short communication", "short paper", "简报"]
      technical-note:
        path: static/core/workflow.md
        triggers: ["technical note", "technical notes", "技术说明"]
      letter:
        path: static/core/workflow.md
        triggers: ["letter", "letter article", "来信"]
      comment-and-opinion:
        path: static/core/workflow.md
        triggers: ["comment and opinion", "commentary", "评论与观点"]
      perspective:
        path: static/core/workflow.md
        triggers: ["perspective", "perspective article", "视角"]

references:
  on_demand:
    submission-package-protocol:
      path: references/submission-package-protocol.md
      when: "The user wants to assemble a full submission package."
    cover-letter-strategy:
      path: references/cover-letter-strategy.md
      when: "The user wants to draft or polish a cover letter."
    highlights-strategy:
      path: references/highlights-strategy.md
      when: "The user wants to draft Elsevier highlights."
    declaration-boundary:
      path: references/declaration-boundary.md
      when: "The user asks about declarations, conflicts, funding, or ethics statements."
    live-verification:
      path: references/live-verification.md
      when: "The user asks which fields must be re-checked against the current Guide for Authors."
    journal-cbm-facts:
      path: ../_shared/journal-formats/cbm.md
      when: "The target journal is CBM."
    journal-ccc-facts:
      path: ../_shared/journal-formats/ccc.md
      when: "The target journal is CCC."
    journal-rmpd-facts:
      path: ../_shared/journal-formats/rmpd.md
      when: "The target journal is RMPD."
    journal-jbe-facts:
      path: ../_shared/journal-formats/jbe.md
      when: "The target journal is JBE."
    journal-building-environment-facts:
      path: ../_shared/journal-formats/building-environment.md
      when: "The target journal is Building and Environment."
    journal-energy-buildings-facts:
      path: ../_shared/journal-formats/energy-buildings.md
      when: "The target journal is Energy and Buildings."
    journal-ceramics-international-facts:
      path: ../_shared/journal-formats/ceramics-international.md
      when: "The target journal is Ceramics International."
    journal-acta-materialia-facts:
      path: ../_shared/journal-formats/acta-materialia.md
      when: "The target journal is Acta Materialia."
    journal-jmca-facts:
      path: ../_shared/journal-formats/jmca.md
      when: "The target journal is JMCA."
    journal-nature-materials-facts:
      path: ../_shared/journal-formats/nature-materials.md
      when: "The target journal is Nature Materials."

assets:
  - assets
scripts:
  - scripts
quality_gates:
  - release gate must report no issues for this skill
  - declarations must not be fabricated; empty declarations stay as placeholders
  - live-verification fields must be marked before final assembly

handoffs:
  provides:
    submission-package:
      description: "Assembled submission package with cover letter, highlights, checklist, declarations, and source stubs"
      contract: ../../_shared/contracts/submission-package.yaml
      version: "1.0"
  consumes:
    - handoff: figure-handoff
      from: materials-figure
      optional: true
    - handoff: data-package
      from: materials-data
      optional: true
    - handoff: gate-report
      from: materials-research
      optional: true

release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
