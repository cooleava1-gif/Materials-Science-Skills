version: "1.2.0"
status: beta

always_load:
  - static/core/contract.md
  - ../_shared/core/direction-profile.md
  - ../_shared/core/stance.md
  - ../_shared/core/evidence-contract.md
  - ../_shared/core/ethics.md
  - ../_shared/paper-production/weakness-routing.md
  - static/core/response-contract.md
  - static/core/workflow.md

axes:
  response_task:
    default: point-by-point
    values:
      point-by-point:
        path: references/response-strategy.md
        triggers: ["reviewer", "comments", "response", "point-by-point", "逐条回复", "回复审稿人"]
      response-patterns:
        path: references/response-patterns.md
        triggers: ["English needs major revision", "add more references", "novelty", "sample size", "error bars", "raw data", "高频审稿意见"]
      strategy-library:
        path: references/reviewer-strategy-library.md
        triggers: ["strategy", "novelty challenge", "method justification", "scope boundary", "conflicting reviewers", "策略", "新颖性质疑", "方法论证", "范围界定"]
      remediation-plans:
        path: references/experiment-remediation-plans.md
        triggers: ["experiment plan", "remediation", "补救方案", "实验计划", "补充实验", "FTIR", "SEM", "XRD", "mechanical testing", "durability testing"]
      comment-patterns:
        path: references/reviewer-comment-patterns.md
        triggers: ["reviewer pattern", "common comment", "typical concern", "审稿模式", "常见意见", "典型问题", "pattern recognition"]
      revision-plan:
        path: references/experiment-revision.md
        triggers: ["revise", "experiment", "revision plan", "补实验", "修改方案"]
      document-format:
        path: references/response-document-format.md
        triggers: ["author response", "tracked changes", "revision cover letter", "response document", "回复文档", "修回格式"]
      language-polish:
        path: references/language-bank.md
        triggers: ["polish response", "tone", "rebuttal language", "语气", "润色回复"]
      risk-audit:
        path: references/response-risk-checklist.md
        triggers: ["risk", "reject", "major revision", "desk reject", "拒稿风险", "大修"]

  comment_type:
    default: mixed
    values:
      mechanism:
        path: references/experiment-revision.md
        triggers: ["mechanism", "FTIR", "SEM", "fluorescence", "XRD", "TG", "机理", "显微"]
      performance:
        path: references/experiment-revision.md
        triggers: ["strength", "bonding", "durability", "viscosity", "performance", "粘结", "耐久", "黏度"]
      writing:
        path: references/language-bank.md
        triggers: ["grammar", "English", "clarity", "language", "表达", "英文"]
      novelty:
        path: references/reviewer-strategy-library.md
        triggers: ["novelty", "contribution", "incremental", "新颖性", "贡献", "创新性"]
      method:
        path: references/reviewer-strategy-library.md
        triggers: ["method", "justification", "sample size", "statistics", "方法", "论证", "样本量"]
      scope:
        path: references/reviewer-strategy-library.md
        triggers: ["scope", "beyond scope", "another journal", "范围", "超出范围"]

  journal_family:
    default: materials
    values:
      cbm-jbe:
        path: references/response-strategy.md
        triggers: ["CBM", "Construction and Building Materials", "JBE", "Journal of Building Engineering"]
      ccc:
        path: references/response-strategy.md
        triggers: ["CCC", "Cement and Concrete Composites", "CCR", "Cement and Concrete Research"]
      rmpd-ijpe:
        path: references/response-strategy.md
        triggers: ["RMPD", "IJPE", "JRE", "pavement", "Road Materials and Pavement Design"]
  tone:
    default: academic
    values:
      academic:
        path: static/fragments/tone/academic.md
        triggers: ["professional", "courteous", "standard response", "礼貌", "专业"]
      firm:
        path: static/fragments/tone/firm.md
        triggers: ["unreasonable request", "impossible experiment", "scope boundary", "firm", "坚定", "不合理要求"]
  material_family:
    detect: "Which materials family is central?"
    default: neutral
    values:
      neutral:
        path: ../_shared/core/direction-profile.md
        triggers: ["neutral family", "profile family fallback", "no saved family"]
      civil:
        path: ../materials-research/static/fragments/domain/civil-family.md
        triggers: ["civil", "construction", "building", "pavement", "土木", "建筑"]
      polymers:
        path: ../materials-research/static/fragments/domain/polymers-family.md
        triggers: ["polymer", "resin", "rubber", "epoxy", "高分子", "聚合物", "树脂"]
      metals:
        path: ../materials-research/static/fragments/domain/metals-family.md
        triggers: ["metal", "alloy", "steel", "aluminum", "金属", "合金", "钢"]
      ceramics:
        path: ../materials-research/static/fragments/domain/ceramics-family.md
        triggers: ["ceramic", "porcelain", "refractory", "陶瓷", "耐火"]
      functional:
        path: ../materials-research/static/fragments/domain/functional-family.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "半导体", "介电", "压电"]
      nano:
        path: ../materials-research/static/fragments/domain/nano-family.md
        triggers: ["nano", "nanoparticle", "2D material", "纳米", "纳米材料"]

  domain:
    detect: "Which material domain does the response target?"
    default: general
    values:
      general:
        path: ../_shared/core/direction-profile.md
        triggers: ["general fallback", "profile fallback", "neutral routing"]
      civil:
        path: static/fragments/domain/civil.md
        triggers: ["civil", "asphalt", "cement", "concrete", "pavement", "construction", "土木", "建筑", "道路"]
      polymers:
        path: static/fragments/domain/polymers.md
        triggers: ["polymer", "resin", "rubber", "thermoplastic", "高分子"]
      metals:
        path: static/fragments/domain/metals.md
        triggers: ["metal", "alloy", "steel", "金属", "合金"]
      ceramics:
        path: static/fragments/domain/ceramics.md
        triggers: ["ceramic", "sintering", "陶瓷"]
      functional:
        path: static/fragments/domain/functional.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "半导体"]
      nano:
        path: static/fragments/domain/nano.md
        triggers: ["nano", "nanoparticle", "2D material", "纳米"]

  experiment_type:
    detect: "What type of experiment is requested?"
    default: none
    values:
      none:
        path: ../_shared/core/direction-profile.md
        triggers: ["no experiment request", "neutral experiment fallback"]
      general:
        path: references/experiment-remediation-plans.md
        triggers: ["experiment", "test", "实验", "测试"]
      mechanism:
        path: references/experiment-remediation-plans.md
        triggers: ["FTIR", "SEM", "XRD", "TG", "mechanism", "characterization", "机理", "表征"]
      performance:
        path: references/experiment-remediation-plans.md
        triggers: ["mechanical", "durability", "bonding", "rheology", "性能", "耐久", "粘结"]
      statistical:
        path: references/experiment-remediation-plans.md
        triggers: ["replicate", "sample size", "ANOVA", "statistics", "重复", "样本量", "统计"]
      comparison:
        path: references/experiment-remediation-plans.md
        triggers: ["control", "baseline", "benchmark", "comparison", "对照", "基准", "比较"]

references:
  on_demand:
    - condition: reviewer comment requires strategic response beyond simple revision
      path: references/reviewer-strategy-library.md
    - condition: reviewer requests additional experiments or evidence
      path: references/experiment-remediation-plans.md
    - condition: reviewer comment matches common patterns or needs pattern recognition
      path: references/reviewer-comment-patterns.md
    - condition: high-frequency comment patterns (language, references, novelty, sample size)
      path: references/response-patterns.md
    - condition: mechanism or performance revision plans
      path: references/experiment-revision.md
    - condition: response document formatting (author response, tracked changes)
      path: references/response-document-format.md
    - condition: language polishing and tone adjustment
      path: references/language-bank.md
    - condition: risk audit before resubmission
      path: references/response-risk-checklist.md

assets:
  - assets
scripts:
  - scripts
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract

handoffs:
  provides: {}
  consumes: []
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
