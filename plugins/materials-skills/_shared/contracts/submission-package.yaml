name: submission-package
version: "1.0"
description: Assembled submission package with cover letter, highlights, checklist, declarations, and source stubs.
produced_by: materials-submission
consumed_by:
  - materials-research
required_fields:
  - manifest_path
  - target_journal
  - article_type
  - package_dir
  - status
  - artifacts
  - inputs
  - verification
optional_fields:
  - writing_state_path
  - figure_package_path
  - fair_package_path
  - weakness_routing_path
status_values:
  - ready
  - dry-run
  - blocked
artifact_status_values:
  - ready
  - not_required
  - blocked
artifact_ownership_values:
  - materials-submission
  - user-preserved
input_status_values:
  - loaded
  - not_supplied
  - missing
  - unreadable
  - unparseable
verification_fields:
  - live_verification_acknowledged
  - placeholders
  - gate_status
required_artifacts:
  - package_manifest
  - handoff_manifest
  - cover_letter
  - highlights
  - keywords
  - declarations
  - submission_checklist
  - manuscript_source
  - figure_source
  - data_source
  - reviewer_risk_regression
artifact_record_notes:
  ownership: "Set to user-preserved when a stale optional artifact exists on disk but was not regenerated by materials-submission."
  sha256: "Record the hash for generated and user-preserved files when readable."
