name: data-package
version: "1.0"
description: "FAIR-organized dataset package with metadata and data availability statement"
produced_by: materials-data
consumed_by:
  - materials-figure
  - materials-research
  - materials-submission
required_fields:
  - contract
  - contract_version
  - status
  - package_dir
  - artifacts
status_values:
  - ready
  - blocked
artifact_status_values:
  - ready
  - missing
required_artifacts:
  - metadata
  - readme
  - data_availability_statement
  - fair_audit
  - raw_data
  - processed_data
  - figures

artifacts:
  data-package.yaml:
    description: "Machine-readable data-package handoff manifest"
    required: true
  metadata.md:
    description: "Dataset metadata with units, standards, and conditions"
    required: true
    columns:
      test_standard: { type: string, required: true }
      replicate_count: { type: integer, required: true }
      temperature: { type: string, required: false }
      humidity: { type: string, required: false }
      curing_condition: { type: string, required: false }
      aging_condition: { type: string, required: false }
  README.md:
    description: "Dataset overview and usage instructions"
    required: true
  data_availability_statement.md:
    description: "Journal-specific data availability statement"
    required: true
  raw_data/:
    description: "Raw experimental data files"
    required: true

templates:
  - ../../skills/materials-data/assets/templates/metadata-template.md
  - ../../skills/materials-data/assets/templates/dataset-readme-template.md
  - ../../skills/materials-data/assets/templates/data-availability-template.md
  - ../../skills/materials-data/assets/templates/experiment-data-template.csv
