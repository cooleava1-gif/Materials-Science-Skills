characterization:
- evidence_tier: definitive
  method: OM (Optical Microscopy)
  purpose: Grain size, phase fraction (ferrite, pearlite, martensite, austenite),
    inclusion rating
- evidence_tier: strong
  method: SEM/EDS
  purpose: Fracture surface analysis, inclusion chemistry, precipitate identification
- evidence_tier: strong
  method: XRD
  purpose: Phase identification, retained austenite quantification, texture analysis
- evidence_tier: strong
  method: TEM
  purpose: Precipitate characterization (carbides, nitrides), dislocation structure
- evidence_tier: definitive
  method: Hardness Testing
  purpose: Brinell, Rockwell, Vickers hardness mapping
claim_types:
- common_risks:
  - Reporting single-condition YS/UTS without a baseline heat treatment for comparison
  - Claiming strength-ductility synergy without showing the full stress-strain curve
  - Ignoring strain rate and specimen orientation effects on the trade-off
  evidence_required:
  - Tensile data (YS, UTS, elongation) per ASTM E8/E8M with specimen geometry
  - Comparison across different heat treatment conditions (e.g., quench & temper,
    anneal, normalize)
  - Processing condition documentation (austenitizing temperature, cooling rate, tempering)
  type: strength_ductility_balance
- common_risks:
  - Claiming precipitation strengthening without TEM evidence of precipitate characteristics
  - Inferring phase transformation mechanism from hardness alone without microstructural
    proof
  - Over-interpreting XRD peaks without quantitative phase analysis
  evidence_required:
  - TEM/SEM microstructure showing precipitate size, distribution, and morphology
  - XRD phase analysis identifying retained austenite, martensite, or carbide phases
  - Hardness curve versus tempering temperature or aging time
  type: mechanism_explanation
- common_risks:
  - Reporting corrosion potential without polarization resistance or rate
  - Extrapolating short-term lab tests to long-term service without validation
  - Ignoring pitting and crevice corrosion localized attack
  evidence_required:
  - Electrochemical data (potentiodynamic polarization, EIS) with test electrolyte
  - Salt spray or immersion exposure results with stated duration
  - Corrosion rate (mm/year) quantified from weight loss or polarization resistance
  type: corrosion_resistance
coverage_tier: full
