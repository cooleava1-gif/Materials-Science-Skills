  typical_range: 10–10000
  unit: dimensionless
- id: loss_tangent
  name: Loss Tangent (tan δ)
  test_methods:
  - ASTM D150 (impedance spectroscopy)
  typical_range: 0.001–0.1
  unit: dimensionless
- id: remanent_polarization
  name: Remanent Polarization (Pr)
  test_methods:
  - Sawyer-Tower P-E loop
  typical_range: 1–80
  unit: μC/cm²
- id: coercive_field
  name: Coercive Field (Ec)
  test_methods:
  - Sawyer-Tower P-E loop
  typical_range: 5–100
  unit: kV/cm
- id: piezoelectric_coefficient_d33
  name: Piezoelectric Coefficient (d33)
  test_methods:
  - Quasi-static d33 meter
  - IEEE 180 resonance method
  typical_range: 2–600
  unit: pC/N
- id: curie_temperature
  name: Curie Temperature
  test_methods:
  - DSC
  - Dielectric constant vs temperature
  typical_range: 50–600
  unit: °C
