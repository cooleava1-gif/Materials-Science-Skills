characterization:
- evidence_tier: definitive
  method: Tensile Testing
  purpose: Yield strength, ultimate strength, elongation
- evidence_tier: strong
  method: SEM/EDS
  purpose: Corrosion product analysis, fracture surface, coating morphology
- evidence_tier: strong
  method: XRD
  purpose: Corrosion product identification (rust phases)
- evidence_tier: strong
  method: EIS
  purpose: Corrosion rate measurement for coated systems
claim_types:
- common_risks:
  - Reporting single-grade properties without a baseline for comparison
  - Claiming structural adequacy without code-specified strength and ductility limits
  - Ignoring size effect and statistical variability in structural members
  evidence_required:
  - Tensile data (YS, UTS, elongation) per ASTM E8 / GB/T 228.1 with specimen geometry
  - Control/baseline grade comparison under identical conditions
  - Compliance with structural design code requirements (e.g., GB/T 1591 grade)
  type: structural_performance
- common_risks:
  - Reporting corrosion potential without polarization resistance or rate
  - Claiming coating protection without adhesion or defect tolerance evidence
  - Extrapolating short-term lab tests to service life without validation
  evidence_required:
  - Electrochemical data (potentiodynamic polarization, EIS) with test electrolyte
  - Coating adhesion test results (pull-off or cross-cut)
  - Corrosion rate (mm/year) quantified from weight loss or polarization resistance
  type: corrosion_protection
- common_risks:
  - Reporting weld strength without HAZ hardness or microstructure
  - Ignoring fracture location (base metal, HAZ, or weld metal) in interpretation
  - Claiming weldability without procedure qualification data
  evidence_required:
  - HAZ hardness profile across the weld cross-section
  - Welded joint tensile strength with fracture location documented
  - Welding procedure qualification (parameters, consumables, heat input)
  type: weld_performance
coverage_tier: full
