characterization:
- evidence_tier: definitive
  method: XRR
  purpose: Film thickness, density, roughness
- evidence_tier: strong
  method: XRD/GIXRD
  purpose: Phase identification, texture, residual stress
- evidence_tier: strong
  method: SEM/FIB
  purpose: Cross-section thickness, columnar microstructure, interface
- evidence_tier: strong
  method: AFM
  purpose: Surface roughness, grain size, topography
coverage_tier: full
cross_references:
  related:
  - semiconductors
  - nanocomposites
description:
  engineering_problems:
  - Film thickness uniformity and step coverage optimization
  - Adhesion and residual stress management
  - Microstructure control from amorphous to epitaxial
  - Barrier and functional coating performance
  summary: PVD/CVD thin films, ALD coatings, spin-coated films, and nanostructured
    coatings for functional surfaces
  typical_applications:
  - Hard coatings (TiN, DLC) for cutting tools
  - Transparent conductive oxides (ITO, AZO)
  - Thin film solar cells and battery electrodes
  - Corrosion and wear protection coatings
family: nano
figure_archetypes:
- id: xrd_pattern
  description: X-ray diffraction pattern for phase identification
  required_columns:
  - two_theta
  - as_deposited
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/nano-thin-films_xrd.csv
  column_map:
    x_values:
      column: two_theta
    y_series:
    - key: As Deposited
      column: as_deposited
    - key: Annealed
      column: annealed
- id: trend_curve
  description: Nanoindentation hardness trend with uncertainty
  required_columns:
  - film_thickness_nm
  - hardness_GPa
  - hardness_GPa_std
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/nano-thin-films_trend_curve.csv
  column_map:
    x_values:
      column: film_thickness_nm
    y_values:
      column: hardness_GPa
    y_errors:
      column: hardness_GPa_std
id: nano-thin-films
name: Thin Films and Coatings (Nanoscale)
narrative:
  arc: Precursor/Target → Deposition → Film Growth → Microstructure → Functional Properties
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/nano-thin-films.md
    narrative_guide: skills/materials-writing/references/nano-thin-films-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/nano-thin-films-reviewer-criteria.md
skill_mapping:
  data_schemas:
  - skills/materials-figure/scripts/figures4materials/data/nano-thin-films_xrd.csv
  - skills/materials-figure/scripts/figures4materials/data/nano-thin-films_trend_curve.csv
  figure_packages:
  - skills/materials-figure/examples/figure-packages/nano-thin-films-demo
  figure_scripts:
  - skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  - skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
