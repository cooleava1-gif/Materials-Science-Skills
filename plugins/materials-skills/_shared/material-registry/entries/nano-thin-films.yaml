properties:
- id: film_thickness
  name: Film Thickness
  test_methods:
  - X-ray reflectometry (XRR)
  - Profilometer step height (ASTM B748)
  typical_range: 5–2000
  unit: nm
- id: hardness
  name: Hardness
  test_methods:
  - Instrumented indentation (ISO 14577)
  typical_range: 1–40
  unit: GPa
- id: surface_roughness
  name: Surface Roughness
  test_methods:
  - AFM topography (ISO 25178)
  typical_range: 0.2–50
  unit: nm
- id: adhesion_strength
  name: Adhesion Strength
  test_methods:
  - Scratch test (ASTM C1624)
  - Pull-off test
  typical_range: 5–80
  unit: MPa
- id: residual_stress
  name: Residual Stress
  test_methods:
  - Curvature method (Stoney equation)
  - XRD sin²ψ method
  typical_range: -4 to +4
  unit: GPa
- id: refractive_index
  name: Refractive Index
  test_methods:
  - Spectroscopic ellipsometry
  typical_range: 1.3–2.6
  unit: dimensionless
