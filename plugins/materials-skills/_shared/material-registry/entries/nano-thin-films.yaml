characterization:
- evidence_tier: definitive
  key_features:
  - Kiessig fringes for film thickness and roughness
  - Critical angle shift for electron density determination
  method: XRR
  purpose: Film thickness, density, roughness
- evidence_tier: strong
  key_features:
  - GIXRD for thin film phase identification with enhanced surface sensitivity
  - Texture (pole figure) for preferred orientation
  - sin²ψ method for residual stress
  method: XRD/GIXRD
  purpose: Phase identification, texture, residual stress
- evidence_tier: strong
  key_features:
  - Cross-section thickness and columnar microstructure
  - Interface quality and delamination evidence
  method: SEM/FIB
  purpose: Cross-section thickness, columnar microstructure, interface
- evidence_tier: strong
  key_features:
  - Ra/Rq roughness parameters from topography maps
  - Grain size and columnar feature analysis
  method: AFM
  purpose: Surface roughness, grain size, topography
- evidence_tier: strong
  key_features:
  - Load-displacement curve for hardness and modulus extraction
  - Substrate effect correction for thin films
  method: Nanoindentation
  purpose: Hardness, elastic modulus, film-substrate mechanical response
claim_types:
- common_risks:
  - Reporting hardness without substrate effect correction
  - Claiming 'high hardness' without indentation depth relative to thickness
  - Single-load data claimed as representative
  evidence_required:
  - Control comparison (bare substrate vs. coated)
  - Hardness/modulus data with error bars across indentation depths
  - 'Test conditions: load range, indentation depth, tip geometry'
  type: performance_improvement
- common_risks:
  - Claiming 'growth mechanism confirmed' from morphology alone
  - No control over competing explanations (Volmer-Weber vs. Frank-van der Merwe)
  evidence_required:
  - Cross-section SEM/TEM evidence of growth mode and microstructure
  - XRD texture evolution across deposition conditions
  - Interface characterization (adhesion, interdiffusion)
  type: mechanism_explanation
- common_risks:
  - Qualitative tape test claimed as 'good adhesion'
  - No quantitative critical load from scratch test
  evidence_required:
  - Scratch test critical load (Lc) with failure mode classification
  - Cross-cut or pull-off test for quantitative adhesion strength
  - 'Test conditions: indenter radius, loading rate, scratch length'
  type: adhesion_quality
- common_risks:
  - Single-point thickness claimed as 'uniform'
  - No step coverage or edge uniformity data
  evidence_required:
  - Thickness mapping across wafer or substrate area
  - Step coverage data for feature sidewalls and trenches
  - 'Deposition parameters: power, pressure, temperature, time'
  type: thickness_control
coverage_tier: full
cross_references:
  related:
  - semiconductors
  - nanocomposites
description:
  engineering_problems:
  - Film thickness uniformity and step coverage optimization
  - Adhesion and residual stress management
  - Microstructure control from amorphous to epitaxial
  - Barrier and functional coating performance
  summary: PVD/CVD thin films, ALD coatings, spin-coated films, and nanostructured
    coatings for functional surfaces
  typical_applications:
  - Hard coatings (TiN, DLC) for cutting tools
  - Transparent conductive oxides (ITO, AZO)
  - Thin film solar cells and battery electrodes
  - Corrosion and wear protection coatings
