  test_methods:
  - ASTM C1161 / EN 843-1
  typical_range: 300–1200
  unit: MPa
- id: fracture_toughness
  name: Fracture Toughness
  test_methods:
  - ASTM C1421 (SENB, CNB)
  - ISO 23146
  typical_range: 2–10
  unit: MPa·m¹/²
- id: vickers_hardness
  name: Vickers Hardness
  test_methods:
  - ASTM C1327 / ISO 14705
  typical_range: 10–25
  unit: GPa
- id: thermal_conductivity
  name: Thermal Conductivity
  test_methods:
  - ASTM E1461 (laser flash)
