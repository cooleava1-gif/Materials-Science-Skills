  typical_range: 2–300
  unit: W/(m·K)
- id: cte
  name: Coefficient of Thermal Expansion
  test_methods:
  - ASTM E228 / ISO 17562
  typical_range: 3–12
  unit: 10⁻⁶/K
- id: weibull_modulus
  name: Weibull Modulus
  test_methods:
  - ASTM C1239 / ISO 20501
  typical_range: 5–20
  unit: dimensionless
