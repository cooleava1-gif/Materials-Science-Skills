characterization:
- evidence_tier: strong
  method: SEM
  purpose: 'Microstructure: grain size, porosity, fracture surface analysis'
- evidence_tier: definitive
  method: XRD
  purpose: Phase identification, crystalline content, polymorph detection (e.g., t→m
    ZrO₂ transformation)
- evidence_tier: strong
  method: Raman Spectroscopy
  purpose: Phase identification (especially ZrO₂ polymorphs), stress analysis
- evidence_tier: strong
  method: TEM
  purpose: Grain boundary structure, nanoscale phase distribution, dislocation analysis
- evidence_tier: strong
  method: Dilatometry
  purpose: Sintering shrinkage, thermal expansion, phase transformation temperatures
claim_types:
- common_risks:
  - Reporting only mean strength without Weibull statistics
  - Fracture toughness from indentation method without validation
  evidence_required:
  - Mechanical test data with sample size (≥10 for Weibull)
  - Density and porosity data
  - 'Processing conditions: sintering T, time, atmosphere'
  type: performance_improvement
- common_risks:
  - Claiming 'grain refinement improves strength' without Hall-Petch analysis
  - Over-interpreting toughening mechanism from limited TEM evidence
  evidence_required:
  - Microstructure evidence (SEM/TEM of key features)
  - Phase identification (XRD/Raman)
  - Clear link between microstructural feature and property change
  type: mechanism_explanation
- common_risks:
  - Reporting sintered density without grain size or microstructure evidence
  - Claiming full densification without residual porosity measurement
  - Ignoring atmospheric effects (oxidation of non-oxide ceramics)
  evidence_required:
  - Sintering curve with density vs. temperature/time
  - Grain size measurement (SEM/lineal intercept, ≥200 grains)
  - Phase composition before and after sintering (XRD)
  type: sintering_optimization
coverage_tier: full
cross_references:
  related:
  - functional-ceramics
  - refractories
  - bioceramics
description:
  engineering_problems:
  - High-temperature mechanical performance and thermal stability
  - Fracture toughness improvement in brittle ceramics
  - Wear resistance for tooling and bearing applications
  - Thermal barrier and environmental barrier coating systems
  - Sintering optimization for dense, defect-free microstructures
  summary: Advanced structural ceramics including alumina, zirconia, silicon carbide,
    silicon nitride, and related materials
  typical_applications:
  - Cutting tools and wear-resistant components
  - High-temperature furnace components and refractories
  - Ballistic armor
  - Biomedical implants (alumina, zirconia)
  - Heat exchangers and SOFC components
