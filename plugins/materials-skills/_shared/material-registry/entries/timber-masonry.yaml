characterization:
- evidence_tier: definitive
  method: Mechanical Testing
  purpose: Compression, bending, and tension parallel/perpendicular to grain
- evidence_tier: supporting
  method: SEM
  purpose: Wood/bamboo microstructure, adhesive penetration
claim_types:
- type: mechanical_performance
  evidence_required:
  - Strength data parallel and perpendicular to grain
  - Flexural strength (MOR) data
  - Control comparison with replicate statistics
  common_risks:
  - Reporting only one grain orientation
  - No replicate statistics for strength claims
  - Comparing species or grades without normalization
- type: moisture_durability
  evidence_required:
  - Water absorption rate data
  - Swelling/shrinkage (dimensional stability) curve
  - Moisture content vs. strength relationship
  common_risks:
  - Durability claim from short-term wetting only
  - No dimensional stability data
  - Ignoring moisture-strength coupling
- type: connection_performance
  evidence_required:
  - Joint/connection strength data
  - Pull-out or withdrawal force
  - Shear strength at the connection
  common_risks:
  - Connection claim based on member strength alone
  - No failure mode identification
  - Ignoring moisture effects on joint behavior
coverage_tier: full
