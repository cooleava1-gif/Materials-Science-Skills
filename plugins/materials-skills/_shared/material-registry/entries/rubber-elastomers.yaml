characterization:
- evidence_tier: strong
  method: DMA
  purpose: 'Viscoelastic properties: storage/loss modulus, tan δ, Tg'
- evidence_tier: strong
  method: TGA
  purpose: Filler content (carbon black), polymer degradation profile
- evidence_tier: strong
  method: SEM
  purpose: Filler dispersion, fracture surface, phase morphology in blends
claim_types:
- common_risks:
  - Reporting tensile strength without elongation or without a control compound
  - Comparing compounds cured under different conditions as if they were filler-driven
  - Ignoring hysteresis and permanent set when claiming elastic recovery
  evidence_required:
  - Stress-strain curve (tensile strength, elongation at break) per ASTM D412
  - Control compound and filler loading/curative level
  - Elastic recovery or compression set data where recovery is claimed
  type: performance_improvement
- common_risks:
  - Claiming filler reinforcement without SEM evidence of dispersion
  - Inferring crosslink density from hardness alone without DMA or swelling measurement
  - Over-interpreting tan δ peaks without linking them to network structure
  evidence_required:
  - DMA data (storage/loss modulus, tan δ) showing network response
  - SEM/TEM filler dispersion and morphology
  - Crosslink density measurement (DMA rubbery plateau, swelling, or equilibrium)
  type: mechanism_explanation
- common_risks:
  - Reporting property change after aging without a baseline retention value
  - Using lab aging conditions unrepresentative of service temperature or ozone
  - Claiming aging resistance without FTIR evidence of oxidation products
  evidence_required:
  - Heat/ozone aging data with time, temperature, and atmosphere
  - Property retention (%) for tensile strength and elongation
  - FTIR evidence of oxidation or crosslink changes
  type: aging_resistance
coverage_tier: full
