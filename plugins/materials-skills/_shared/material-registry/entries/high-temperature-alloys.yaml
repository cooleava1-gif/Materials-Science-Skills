characterization:
- evidence_tier: strong
  method: SEM/EDS
  purpose: γ/γ′ microstructure, precipitate size/fraction, TCP phase identification
- evidence_tier: strong
  method: TEM
  purpose: γ′ morphology, dislocation structure after creep, interfacial analysis
- evidence_tier: strong
  method: XRD
  purpose: Phase identification, lattice parameter measurement, γ′ misfit
- evidence_tier: definitive
  method: Creep Testing
  purpose: Creep rate, rupture life, minimum creep rate vs. Larson-Miller parameter
claim_types:
- common_risks:
  - Reporting rupture life without minimum creep rate or the steady-state regime
  - Extrapolating short-duration creep data across orders of magnitude in time/temperature
    without Larson-Miller validation
  - Ignoring scatter in creep data and not reporting replicate tests
  evidence_required:
  - Creep strain-time curve with primary, steady, and tertiary regimes identified
  - Minimum creep rate with applied stress and temperature conditions
  - Larson-Miller parameter or other time-temperature extrapolation basis
  type: creep_resistance
- common_risks:
  - Claiming γ′ strengthening without TEM evidence of precipitate size, fraction, and
    coherency
  - Inferring microstructural stability from the as-processed condition without aging/exposure
    evidence
  - Over-interpreting lattice misfit without high-resolution XRD or TEM measurement
  evidence_required:
  - SEM/TEM microstructure showing γ/γ′ morphology and precipitate distribution
  - γ′ size distribution and volume fraction measurement
  - Lattice misfit analysis (XRD/TEM) where misfit strengthening is claimed
  type: mechanism_explanation
- common_risks:
  - Reporting single-temperature isothermal oxidation without cyclic oxidation data
  - Claiming oxidation resistance without oxide scale cross-section or phase analysis
  - Ignoring spallation and mass-loss events in cyclic tests
  evidence_required:
  - TGA oxidation mass-change curve with temperature, time, and atmosphere
  - Oxide scale analysis (SEM/EDS/XRD of cross-section and phase composition)
  - Cyclic oxidation data with spallation behavior where relevant
  type: oxidation_resistance
coverage_tier: full
cross_references:
  related:
  - ferrous-alloys
  - nonferrous-alloys
description:
  engineering_problems:
  - Creep resistance at elevated temperatures (>0.4 Tm)
  - Oxidation and hot corrosion resistance
  - γ′ precipitate coarsening and microstructural stability
  - Thermal barrier coating systems for turbine applications
  summary: Ni-based, Co-based, and Fe-based superalloys for high-temperature service
    in extreme environments
  typical_applications:
  - Gas turbine blades and vanes
  - Rocket engine components
  - Nuclear reactor structural materials
  - High-temperature tooling
