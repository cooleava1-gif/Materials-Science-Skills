characterization:
- evidence_tier: definitive
  method: OM/SEM
  purpose: Melt pool morphology, porosity, lack-of-fusion defects, grain structure
- evidence_tier: strong
  method: XRD/EBSD
  purpose: Phase identification, texture, grain orientation mapping
- evidence_tier: strong
  method: Micro-CT
  purpose: 3D porosity distribution and defect characterization
- evidence_tier: definitive
  method: Density Measurement
  purpose: Archimedes method for relative density
claim_types:
- common_risks:
  - Reporting single-parameter density without a process window map
  - Claiming full density without Micro-CT verification of internal porosity
  - Ignoring lack-of-fusion defects that Archimedes cannot detect
  evidence_required:
  - Archimedes relative density measurements per ASTM B962 with replicate samples
  - Micro-CT porosity analysis showing pore size, distribution, and lack-of-fusion
    defects
  - Process parameter window (laser power, scan speed, hatch spacing) mapping to density
  type: density_optimization
- common_risks:
  - Claiming grain refinement without EBSD evidence of grain size and orientation
  - Inferring microstructure from process parameters without direct characterization
  - Ignoring anisotropy from columnar grain growth along build direction
  evidence_required:
  - EBSD grain orientation and texture mapping
  - SEM melt pool morphology and microstructure characterization
  - XRD phase analysis and texture measurement
  type: microstructure_control
- common_risks:
  - Reporting single-orientation tensile data without addressing anisotropy
  - Claiming as-built performance without post-processing comparison
  - Ignoring surface roughness and defect effects on fatigue life
  evidence_required:
  - Tensile data (YS, UTS, elongation) with build orientation (anisotropy) documented
  - Hardness distribution mapping across the build
  - Fatigue (S-N) data and post-processing (HIP/heat treatment) comparison
  type: mechanical_performance
coverage_tier: full
cross_references:
  related:
  - ferrous-alloys
  - nonferrous-alloys
  - high-temperature-alloys
description:
  engineering_problems:
  - Process parameter optimization for density and defect minimization
  - Microstructure control via thermal history (columnar vs. equiaxed)
  - Residual stress and post-processing heat treatment
  - Surface finish and support structure design
  summary: Additively manufactured metallic materials via PBF-LB, DED, binder jetting,
    and related AM processes
  typical_applications:
  - Complex geometry aerospace components
  - Patient-specific biomedical implants
  - Tooling with conformal cooling channels
  - Lightweight lattice structures
family: metals
