characterization:
- evidence_tier: definitive
  method: OM/SEM
  purpose: Melt pool morphology, porosity, lack-of-fusion defects, grain structure
- evidence_tier: strong
  method: XRD/EBSD
  purpose: Phase identification, texture, grain orientation mapping
- evidence_tier: strong
  method: Micro-CT
  purpose: 3D porosity distribution and defect characterization
- evidence_tier: definitive
  method: Density Measurement
  purpose: Archimedes method for relative density
coverage_tier: full
cross_references:
  related:
  - ferrous-alloys
  - nonferrous-alloys
  - high-temperature-alloys
description:
  engineering_problems:
  - Process parameter optimization for density and defect minimization
  - Microstructure control via thermal history (columnar vs. equiaxed)
  - Residual stress and post-processing heat treatment
  - Surface finish and support structure design
  summary: Additively manufactured metallic materials via PBF-LB, DED, binder jetting,
    and related AM processes
  typical_applications:
  - Complex geometry aerospace components
  - Patient-specific biomedical implants
  - Tooling with conformal cooling channels
  - Lightweight lattice structures
family: metals
figure_archetypes:
- description: Tensile stress-strain for as-built vs. heat-treated conditions
  figure_script: skills/materials-figure/scripts/figures4materials/plot_stress_strain.py
  id: stress_strain
  type: stress_strain
  column_roles:
  - strain
  - stress
  column_map:
    x_values: {"column": "strain_pct"}
    y_values: {"column": "stress_mpa"}
    group_by: {"column": "condition"}
- description: EBSD inverse pole figure map showing grain orientation
  id: ebsd_map
  type: sem_image
  column_roles:
  - image_path
- description: Relative density vs. laser power/scan speed process window
  figure_script: skills/materials-figure/scripts/figures4materials/plot_contour_response_map.py
  id: process_window
  type: contour_plot
  column_roles:
  - power
  - speed
  - density
  column_map:
    x_values: {"column": "wer_pct"}
    y_values: {"column": "curing_temp_c"}
    z_values: {"column": "bond_strength_mpa"}
    xlabel: {"value": "Laser Power (W)"}
    ylabel: {"value": "Scan Speed (mm/s)"}
    figure_name: {"value": "additive_metals_process_window"}
id: additive-metals
name: Additively Manufactured Metals
narrative:
  arc: Powder/Wire → Process Parameters → As-Built Microstructure → Post-Processing
    → Mechanical Performance
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/additive-metals.md
    narrative_guide: skills/materials-writing/references/additive-metals-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/metals-reviewer-criteria.md
properties:
- id: yield_strength
  name: Yield Strength (YS)
  test_methods:
  - ASTM E8 / ASTM F3122
  typical_range: 150–1400
  unit: MPa
- id: relative_density
  name: Relative Density
  test_methods:
  - ASTM B962 / Micro-CT
  typical_range: 98–99.9
  unit: "%"
- id: surface_roughness
  name: Surface Roughness (Ra)
  test_methods:
  - ISO 25178 / ASTM F3122
  typical_range: 1–30
  unit: µm
- id: residual_stress
  name: Residual Stress
  test_methods:
  - XRD / Hole drilling
  typical_range: -500–500
  unit: MPa
skill_mapping:
  data_schemas:
  - skills/materials-figure/scripts/figures4materials/data/metals_stress_strain.csv
  - skills/materials-figure/scripts/figures4materials/data/contour_response_map.csv
  figure_packages:
  - skills/materials-figure/examples/figure-packages/stress-strain
  figure_scripts:
  - skills/materials-figure/scripts/figures4materials/plot_stress_strain.py
  - skills/materials-figure/scripts/figures4materials/plot_contour_response_map.py
standards:
- purpose: Evaluating mechanical properties of metal materials produced via AM
  standard: ASTM F3122
- purpose: Specification for AM Ti-6Al-4V with powder bed fusion
  standard: ASTM F2924
- purpose: Relative density of AM parts using Archimedes principle
  standard: ASTM B962
