characterization:
- evidence_tier: definitive
  method: XRD
  purpose: Phase composition after service, reaction layer identification
- evidence_tier: strong
  method: SEM/EDS
  purpose: Slag penetration, corrosion interface, microstructure evolution
- evidence_tier: strong
  method: Thermal Shock Testing
  purpose: Residual strength after thermal cycling
claim_types:
- common_risks:
  - Claiming thermal shock resistance without residual strength vs cycle data
  - Reporting single-cycle quench test without critical temperature difference
  - Omitting post-shock microstructure evidence of crack propagation
  - Using water quench results to infer air-quench performance
  evidence_required:
  - Residual strength vs number of thermal cycles curve
  - Critical temperature difference (ΔTc) measurement
  - Post-thermal-shock microstructure evidence (SEM of crack patterns)
  type: thermal_shock_resistance
- common_risks:
  - Claiming slag corrosion resistance without interface SEM/EDS analysis
  - Reporting qualitative corrosion observation without depth quantification
  - Missing XRD phase analysis of corrosion reaction layer
  - Ignoring slag composition effect on corrosion mechanism
  evidence_required:
  - Slag corrosion interface SEM/EDS elemental mapping
  - Quantitative corrosion depth measurement
  - XRD phase composition change across corrosion layer
  type: slag_corrosion_resistance
- common_risks:
  - Claiming high-temperature strength without HMOR data
  - Extrapolating cold strength to service temperature
  - Omitting creep deformation data for load-bearing applications
  - Missing RUL measurement for refractoriness under load
  evidence_required:
  - Hot modulus of rupture (HMOR) data at service temperature
  - Refractoriness under load (RUL) curve
  - High-temperature creep deformation data
  type: high_temp_mechanical
coverage_tier: full
