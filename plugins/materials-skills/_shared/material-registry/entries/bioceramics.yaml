characterization:
- evidence_tier: definitive
  method: XRD
  purpose: Phase purity, crystallinity, apatite formation in SBF
- evidence_tier: strong
  method: SEM/EDS
  purpose: Surface morphology after SBF immersion, cell attachment, porosity
- evidence_tier: strong
  method: FTIR/Raman
  purpose: Functional group identification (phosphate, carbonate, silanol)
- evidence_tier: strong
  method: ICP-OES
  purpose: Ion release kinetics in simulated body fluid
coverage_tier: full
cross_references:
  related:
  - structural-ceramics
description:
  engineering_problems:
  - Bioactivity and osseointegration surface optimization
  - Degradation rate control for resorbable bioceramics
  - Mechanical reliability of load-bearing bioceramic implants
  - Porosity control for bone tissue engineering scaffolds
  summary: Hydroxyapatite, beta-tricalcium phosphate, bioactive glasses, calcium phosphates,
    and alumina/zirconia for biomedical implants
  typical_applications:
  - Orthopedic implants (hip, knee, spinal)
  - Dental implants and restorations
  - Bone graft substitutes and scaffolds
  - Drug delivery carriers
family: ceramics
figure_archetypes:
- description: XRD patterns before and after SBF immersion (apatite formation)
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  id: xrd_pattern
  type: xrd_pattern
  column_roles:
  - angle
  - intensity
- description: Mechanical testing of porous scaffolds
  figure_script: skills/materials-figure/scripts/figures4materials/plot_stress_strain.py
  id: stress_strain
  type: stress_strain
  column_roles:
  - strain
  - stress
- description: Ion release concentration of calcium and silicon over time in SBF
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  id: ion_release_kinetics
  type: line_plot
  column_roles:
  - time
  - concentration
id: bioceramics
name: Bioceramics and Bioactive Glasses
narrative:
  arc: Composition → Processing → Surface Chemistry → Bioactivity → Mechanical Performance
    → In Vivo Behavior
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/bioceramics.md
    narrative_guide: skills/materials-writing/references/bioceramics-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/ceramics-reviewer-criteria.md
properties:
- id: apatite_formation_rate
  name: Apatite Formation Rate
  test_methods:
  - ISO 23317
  typical_range: 1–28
  unit: days
- id: compressive_strength
  name: Compressive Strength
  test_methods:
  - ASTM C1424 / ISO 13779-2
  typical_range: 1–150
  unit: MPa
- id: biodegradation_rate
  name: Biodegradation Rate
  test_methods:
  - ISO 10993-9 / ISO 10993-13
  typical_range: 0.1–5
  unit: "%/week"
- id: porosity
  name: Porosity
  test_methods:
  - ASTM C373 / ISO 5017
  typical_range: 30–90
  unit: "%"
- id: dissolution_rate_ion
  name: Ion Dissolution Rate
  test_methods:
  - ISO 10993-14
  typical_range: 1–50
  unit: ppm/day
