characterization:
- evidence_tier: definitive
  method: XRD
  purpose: Phase purity, crystallinity, apatite formation in SBF
- evidence_tier: strong
  method: SEM/EDS
  purpose: Surface morphology after SBF immersion, cell attachment, porosity
- evidence_tier: strong
  method: FTIR/Raman
  purpose: Functional group identification (phosphate, carbonate, silanol)
- evidence_tier: strong
  method: ICP-OES
  purpose: Ion release kinetics in simulated body fluid
claim_types:
- common_risks:
  - Claiming bioactivity without SBF immersion XRD/SEM evidence
  - Reporting apatite formation without time-series data
  - Missing FTIR confirmation of phosphate functional groups
  - Using non-standard SBF protocols without validation
  evidence_required:
  - SBF immersion XRD/SEM evidence of apatite formation
  - Apatite formation time-series data (immersion duration progression)
  - FTIR evidence of phosphate group formation
  type: bioactivity_assessment
- common_risks:
  - Reporting mean strength without Weibull statistical analysis
  - Omitting sample size for mechanical reliability claims
  - Missing porosity-strength relationship data
  - Ignoring brittle fracture scatter in load-bearing applications
  evidence_required:
  - Weibull statistical analysis of strength distribution
  - Compressive strength distribution with sample size
  - Porosity-strength relationship data
  type: mechanical_reliability
- common_risks:
  - Claiming controlled degradation without ion release kinetics
  - Reporting single-timepoint mass loss without curve
  - Omitting pH change data during degradation
  - Extrapolating in vitro degradation to in vivo without validation
  evidence_required:
  - ICP ion release kinetics curve (Ca, Si, P vs time)
  - Mass loss curve over immersion time
  - pH change data during degradation period
  type: degradation_control
coverage_tier: full
cross_references:
  related:
  - structural-ceramics
