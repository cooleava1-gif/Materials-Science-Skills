characterization:
- evidence_tier: strong
  method: XRD
  purpose: Phase identification of clinker minerals and hydration products (C₃S, C₂S,
    C₃A, C₄AF, ettringite, portlandite, C-S-H)
- evidence_tier: strong
  method: SEM/EDS
  purpose: Microstructure analysis of hydrated paste, ITZ characterization, and elemental
    mapping
- evidence_tier: strong
  method: TGA/DTG
  purpose: 'Quantification of hydration products: portlandite (450 °C), C-S-H (100–300
    °C), carbonates (600–800 °C)'
- evidence_tier: strong
  method: Isothermal Calorimetry
  purpose: 'Hydration kinetics: induction period, acceleration, deceleration'
- evidence_tier: supporting
  method: FTIR
  purpose: Hydration product identification and polymer modification (if applicable)
- evidence_tier: strong
  method: MIP (Mercury Intrusion Porosimetry)
  purpose: Pore size distribution and porosity measurement
- evidence_tier: supporting
  method: NMR
  purpose: C-S-H structure, aluminate speciation, water state in pores
claim_types:
- common_risks:
  - Comparing across different specimen geometries without conversion factor
  - No statistics for 'significantly improved' claim
  evidence_required:
  - Control mix comparison with w/c ratio, binder content reported
  - Replicate count and variability (SD or COV)
  - Curing conditions specified (temperature, RH, age)
  type: performance_improvement
- common_risks:
  - Attributing strength gain to 'denser C-S-H' without direct evidence
  - Over-interpreting small XRD peak changes
  evidence_required:
  - Hydration product evidence from XRD, TGA, or NMR
  - Microstructure support from SEM
  - Correlation between measured properties and observed mechanism
  type: mechanism_explanation
- common_risks:
  - Claiming 'green' or 'low-carbon' without LCA
  - Ignoring trade-offs (lower strength, longer curing)
  evidence_required:
  - Functional unit defined
  - Comparison boundary specified (cradle-to-gate, etc.)
  - CO₂ or energy data with source
  type: sustainability_claim
coverage_tier: full
cross_references:
  parent: civil-generic
  related:
  - sustainability-durability
  - construction-materials
description:
  engineering_problems:
  - Concrete strength and workability optimization
  - Hydration kinetics and microstructure development
  - Durability under freeze-thaw, chemical attack, and chloride ingress
  - Sustainable cementitious materials (SCMs, geopolymers, low-carbon binders)
  - UHPC and advanced concrete composite design
  summary: Portland cement, supplementary cementitious materials, concrete mixtures,
    hydration chemistry, and durability
  typical_applications:
  - Structural concrete for buildings and infrastructure
  - Pavement and highway concrete
  - Precast and prestressed concrete elements
  - Repair mortars and grouts
