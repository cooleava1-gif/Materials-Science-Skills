characterization:
- evidence_tier: definitive
  method: Tensile/Elongation Testing
  purpose: Mechanical properties of membranes and sealants
- evidence_tier: strong
  method: Adhesion Testing (Pull-off)
  purpose: Bond strength to substrate
- evidence_tier: strong
  method: Accelerated Aging
  purpose: UV, heat, and water immersion durability
claim_types:
- type: adhesion_performance
  evidence_required:
  - Pull-off adhesion strength data per ASTM D4541
  - Comparison across different substrates (concrete, mortar, metal)
  - Failure mode analysis (cohesive vs adhesive failure)
  common_risks:
  - Reporting adhesion on a single substrate only
  - Claiming good adhesion without identifying failure mode
  - No substrate surface preparation details
- type: durability_assessment
  evidence_required:
  - Accelerated aging data (UV, heat, water immersion)
  - Performance retention rate after aging cycles
  - FTIR evidence of oxidation or polymer degradation
  common_risks:
  - Durability claim from short-term aging only
  - No retention rate quantification
  - Inferring durability without chemical evidence of degradation
- type: movement_capability
  evidence_required:
  - Cyclic tensile movement data at joint
  - Elastic recovery rate per ASTM D412
  - Low-temperature flexibility per ASTM D2137
  common_risks:
  - Movement claim without cyclic loading data
  - Ignoring low-temperature brittleness
  - No elastic recovery quantification
