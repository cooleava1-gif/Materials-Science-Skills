characterization:
- evidence_tier: strong
  key_features:
  - 915 cm⁻¹ (epoxide C–O stretching, decreases with curing)
  - 1240 cm⁻¹ (C–O–C asymmetric stretching)
  - 1730 cm⁻¹ (carbonyl C=O stretching)
  - 1610 cm⁻¹ (aromatic C=C from epoxy resin)
  method: FTIR
  purpose: Curing degree monitoring via epoxide peak disappearance (915, 1240, 1730
    cm⁻¹)
- evidence_tier: strong
  key_features:
  - Sea-island morphology at low polymer content
  - Co-continuous network at optimal polymer dosage
  - Phase separation at excessive polymer loading
  method: SEM
  purpose: Morphology analysis of polymer-modified emulsion films
- evidence_tier: supporting
  key_features:
  - UV-excited epoxy domains appear bright
  - Uniform distribution indicates good compatibility
  method: Fluorescence Microscopy
  purpose: Epoxy resin distribution in asphalt emulsion film
- evidence_tier: strong
  key_features:
  - Time-sweep oscillation for curing monitoring
  - Frequency sweep for viscoelastic characterization
  - Temperature ramp for application window
  method: Rheology
  purpose: Viscosity curve, storage modulus G', loss modulus G'', and curing behavior
- evidence_tier: supporting
  key_features:
  - 'Weight loss stages: moisture → polymer → asphalt decomposition'
  - Residue at 600 °C for inorganic content
  method: TGA/DTG
  purpose: Thermal stability and composition analysis
- evidence_tier: supporting
  method: XRD
  purpose: Crystalline phase identification (if mineral fillers are present)
claim_types:
- common_risks:
  - Reporting mean without variability or replicate count
  - Claiming 'significant' without statistical test
  - Comparing across different test standards
  evidence_required:
  - Control group comparison (unmodified vs. modified)
  - Quantitative bonding strength with error bars
  - 'Test conditions: curing time, temperature, moisture conditioning'
  type: performance_improvement
- common_risks:
  - Claiming 'curing mechanism confirmed' from FTIR alone
  - No control over competing explanations (water evaporation vs. cure)
  evidence_required:
  - FTIR evidence of epoxy curing (peak ratio change)
  - SEM morphology showing polymer distribution
  - Rheology evidence of network formation (G' crossover)
  type: mechanism_explanation
- common_risks:
  - Lab-only aging without field or simulated-service validation
  - Single aging condition claimed as 'durability proven'
  evidence_required:
  - Aged-condition test data (freeze-thaw, UV, moisture, heat)
  - Retention ratio relative to initial performance
  - Comparison with unmodified system under same aging protocol
  type: durability_validation
- common_risks:
  - No explanation of why a particular dosage was chosen
  - Ignoring constructability constraints (viscosity, open time)
  evidence_required:
  - Dosage optimization data showing performance vs. dosage trend
  - Storage stability proof within target dosage window
  type: material_design_rationale
coverage_tier: full
