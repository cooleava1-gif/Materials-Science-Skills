properties:
- id: bonding_strength
  name: Bonding Strength
  test_methods:
  - Pull-off bond test (ASTM D4541 / GB/T 5210)
  - Shear bond test (ASTM D6931)
  typical_range: 0.3–1.5
  unit: MPa
- id: storage_stability
  name: Storage Stability
  test_methods:
  - ASTM D6930 (emulsion stability)
  - GB/T 20623 (storage stability at 25 °C)
  typical_range: < 5%
  unit: '% (24 h separation)'
- id: viscosity
  name: Viscosity
  test_methods:
  - Brookfield rotational viscometer (ASTM D2196)
  typical_range: 100–1000
  unit: mPa·s
- id: curing_degree
  name: Curing Degree
  test_methods:
  - FTIR peak ratio (915 cm⁻¹ epoxide / reference)
  typical_range: 60–90%
  unit: '% (epoxy conversion)'
- id: penetration
  name: Penetration
  test_methods:
  - ASTM D5 / GB/T 0604
  typical_range: 60–120
  unit: 0.1 mm
- id: softening_point
  name: Softening Point
  test_methods:
  - ASTM D36 / GB/T 0606
  typical_range: 45–65
  unit: °C
