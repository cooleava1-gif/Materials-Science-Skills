characterization:
- evidence_tier: definitive
  method: Mechanical Testing
  purpose: Compressive strength, tensile strength, elasticity modulus
- evidence_tier: strong
  method: SEM
  purpose: Pore structure, interface, bonding morphology
claim_types:
- type: performance_improvement
  evidence_required:
  - Strength data with control comparison
  - Replicate statistics (SD or COV)
  - Code or specification compliance verification
  common_risks:
  - Claiming improvement without a control group
  - No replicate statistics for strength claims
  - Ignoring mix design or curing condition differences
- type: durability_assessment
  evidence_required:
  - Aging cycle data (freeze-thaw, wet-dry, thermal)
  - Performance retention rate after cycling
  - Microstructure evidence (SEM, porosity) of degradation
  common_risks:
  - Durability claim from a single cycle count
  - No retention rate quantification
  - Inferring durability without microstructure evidence
- type: multi_material_compatibility
  evidence_required:
  - Interfacial bond strength between materials
  - Volumetric stability (shrinkage, expansion) data
  - Chemical compatibility evidence (no adverse reaction)
  common_risks:
  - Compatibility claim based on strength alone
  - Ignoring dimensional stability at interfaces
  - No chemical interaction analysis
coverage_tier: full
