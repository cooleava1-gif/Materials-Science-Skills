characterization:
- evidence_tier: definitive
  method: Raman Spectroscopy
  purpose: Layer number (G/2D ratio), defect density (D/G ratio), doping level
- evidence_tier: definitive
  method: AFM
  purpose: Thickness measurement, surface morphology, flake size
- evidence_tier: strong
  method: TEM/SAED
  purpose: Crystal structure, layer number, Moiré patterns, grain boundaries
- evidence_tier: strong
  method: XPS
  purpose: Chemical composition, oxidation state, functional groups
coverage_tier: full
cross_references:
  related:
  - nanocomposites
  - nano-thin-films
description:
  engineering_problems:
  - Large-area synthesis (CVD, mechanical exfoliation, liquid-phase exfoliation)
  - Layer-number control and uniformity
  - Environmental stability (oxidation, hydrolysis of MXenes)
  - Contact resistance and charge injection optimization
  summary: Graphene, transition metal dichalcogenides (MoS₂, WS₂), MXenes, hexagonal
    BN, and other 2D layered materials
  typical_applications:
  - Field-effect transistors and logic devices
  - Sensors (gas, strain, biological)
  - Energy storage electrodes (supercapacitors, batteries)
  - Membranes for separation and filtration
family: nano
figure_archetypes:
- id: xrd_pattern
  description: X-ray diffraction pattern for phase identification
  required_columns:
  - two_theta
  - monolayer
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/2d-materials_xrd.csv
  column_map:
    x_values:
      column: two_theta
    y_series:
    - key: Monolayer
      column: monolayer
    - key: Few Layer
      column: few_layer
- id: trend_curve
  description: Photocurrent trend with uncertainty
  required_columns:
  - laser_power_mW
  - photocurrent_uA
  - photocurrent_uA_std
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/2d-materials_trend_curve.csv
  column_map:
    x_values:
      column: laser_power_mW
    y_values:
      column: photocurrent_uA
    y_errors:
      column: photocurrent_uA_std
id: 2d-materials
name: Two-Dimensional Materials (Graphene, MoS₂, MXene)
narrative:
  arc: Precursor → Synthesis → Layer Control → Properties → Device Integration → Performance/Stability
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/2d-materials.md
    narrative_guide: skills/materials-writing/references/2d-materials-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/2d-materials-reviewer-criteria.md
skill_mapping:
  data_schemas:
  - skills/materials-figure/scripts/figures4materials/data/2d-materials_xrd.csv
  - skills/materials-figure/scripts/figures4materials/data/2d-materials_trend_curve.csv
  figure_packages:
  - skills/materials-figure/examples/figure-packages/2d-materials-demo
  figure_scripts:
  - skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  - skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
