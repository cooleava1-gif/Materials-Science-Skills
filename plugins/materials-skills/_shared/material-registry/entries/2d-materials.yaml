description:
  engineering_problems:
  - Large-area synthesis (CVD, mechanical exfoliation, liquid-phase exfoliation)
  - Layer-number control and uniformity
  - Environmental stability (oxidation, hydrolysis of MXenes)
  - Contact resistance and charge injection optimization
  summary: Graphene, transition metal dichalcogenides (MoS₂, WS₂), MXenes, hexagonal
    BN, and other 2D layered materials
  typical_applications:
  - Field-effect transistors and logic devices
  - Sensors (gas, strain, biological)
  - Energy storage electrodes (supercapacitors, batteries)
  - Membranes for separation and filtration
