id: 2d-materials
name: Two-Dimensional Materials (Graphene, MoS₂, MXene)
narrative:
  arc: Precursor → Synthesis → Layer Control → Properties → Device Integration → Performance/Stability
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/2d-materials.md
    narrative_guide: skills/materials-writing/references/2d-materials-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/2d-materials-reviewer-criteria.md
properties:
- id: carrier_mobility
  name: Carrier Mobility
  test_methods:
  - Hall effect measurement (IEC 62607)
  - FET transfer characteristics
  typical_range: 1–15000
  unit: cm²/V·s
- id: on_off_ratio
  name: On/Off Ratio
  test_methods:
  - FET transfer curve (IEC 62607)
  typical_range: 10³–10⁸
  unit: dimensionless
- id: layer_thickness
  name: Layer Thickness
  test_methods:
  - AFM step height (ISO/TS 21357)
  typical_range: 0.34–10
  unit: nm
- id: sheet_resistance
  name: Sheet Resistance
  test_methods:
  - Four-point probe (ASTM F1711)
  typical_range: 10–5000
  unit: Ω/sq
- id: bandgap
  name: Bandgap
  test_methods:
  - UV-Vis absorption / Tauc plot
  - STS (scanning tunneling spectroscopy)
  typical_range: 0–6
  unit: eV
- id: d_spacing
  name: Interlayer Spacing
  test_methods:
  - XRD Bragg equation (ISO/TS 21357)
  typical_range: 3.0–7.0
  unit: Å
