characterization:
- evidence_tier: definitive
  key_features:
  - G/2D ratio for graphene layer number estimation
  - D/G ratio for defect density quantification
  - E2g/A1u peak positions for TMD phase and strain
  method: Raman Spectroscopy
  purpose: Layer number (G/2D ratio), defect density (D/G ratio), doping level
- evidence_tier: definitive
  key_features:
  - Monolayer thickness ~0.34 nm (graphene), ~0.65 nm (MoS2)
  - Flake lateral size and uniformity statistics
  method: AFM
  purpose: Thickness measurement, surface morphology, flake size
- evidence_tier: strong
  key_features:
  - SAED pattern for crystal orientation and layer stacking
  - Lattice resolution for grain boundary and Moiré pattern analysis
  method: TEM/SAED
  purpose: Crystal structure, layer number, Moiré patterns, grain boundaries
- evidence_tier: strong
  key_features:
  - C 1s, Mo 3d, S 2p binding energies for composition and oxidation state
  - Functional group identification for GO/rGO differentiation
  method: XPS
  purpose: Chemical composition, oxidation state, functional groups
- evidence_tier: strong
  key_features:
  - (002) peak shift for interlayer spacing (d-spacing) measurement
  - Peak width for crystallite size along c-axis
  method: XRD
  purpose: Phase identification, interlayer spacing, layer stacking order
claim_types:
- common_risks:
  - Reporting mobility without contact resistance correction
  - Claiming 'high performance' without benchmarking to literature
  - Single-device data claimed as representative
  evidence_required:
  - Control device comparison (e.g., Si MOSFET or bulk crystal)
  - Transfer and output curves with extracted mobility and on/off ratio
  - 'Device geometry: channel length, dielectric, contact metal'
  type: performance_improvement
- common_risks:
  - Claiming 'interface coupling confirmed' from Raman shift alone
  - No control over substrate and environmental effects
  evidence_required:
  - Raman evidence of layer coupling (peak shift/splitting)
  - TEM/AFM evidence of interface structure and layer registry
  - Electrical or optical evidence of coupling-induced property change
  type: mechanism_explanation
- common_risks:
  - Small-area sample claimed as 'scalable synthesis'
  - No uniformity statistics across wafer-scale area
  evidence_required:
  - Large-area coverage map with thickness uniformity statistics
  - Defect density comparison (Raman D/G) across synthesis conditions
  - 'Synthesis parameters: temperature, precursor flow, pressure'
  type: synthesis_quality
- common_risks:
  - Short-term ambient exposure claimed as 'environmentally stable'
  - No accelerated aging or encapsulation comparison
  evidence_required:
  - Performance retention after humidity, temperature, and UV exposure
  - Comparison of bare vs. encapsulated devices under same protocol
  - 'Aging conditions: time, temperature, humidity, atmosphere'
  type: stability_validation
coverage_tier: full
cross_references:
  related:
  - nanocomposites
  - nano-thin-films
description:
  engineering_problems:
  - Large-area synthesis (CVD, mechanical exfoliation, liquid-phase exfoliation)
  - Layer-number control and uniformity
  - Environmental stability (oxidation, hydrolysis of MXenes)
  - Contact resistance and charge injection optimization
  summary: Graphene, transition metal dichalcogenides (MoS₂, WS₂), MXenes, hexagonal
    BN, and other 2D layered materials
  typical_applications:
  - Field-effect transistors and logic devices
  - Sensors (gas, strain, biological)
  - Energy storage electrodes (supercapacitors, batteries)
  - Membranes for separation and filtration
