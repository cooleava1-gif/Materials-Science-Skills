characterization:
- evidence_tier: strong
  method: SEM
  purpose: Fiber-matrix interface, fracture surface, void analysis
- evidence_tier: strong
  method: DMA
  purpose: Viscoelastic properties, Tg of matrix, storage modulus
- evidence_tier: strong
  method: DSC
  purpose: Matrix curing degree, Tg
- evidence_tier: definitive
  method: TGA
  purpose: Fiber/matrix ratio by thermal decomposition
claim_types:
- type: performance_improvement
  evidence_required:
  - Tensile data in 0° and 90° fiber directions per ASTM D3039
  - Interlaminar shear strength (ILSS) per ASTM D2344
  - Flexural strength per ASTM D7264
  - Control laminate comparison with identical layup and fiber volume fraction
  common_risks:
  - Reporting only the 0° direction without 90° transverse data
  - Claiming improvement without normalizing by fiber volume fraction
  - No replicate statistics (SD or COV) for strength claims
- type: interface_optimization
  evidence_required:
  - SEM fracture surface analysis showing failure mode (fiber pull-out vs debonding)
  - ILSS data per ASTM D2344
  - Fiber volume fraction per ASTM D3171
  - Single-fiber fragmentation or micro-droplet pull-out test results
  common_risks:
  - Inferring interface improvement from bulk strength alone
  - No direct interfacial characterization
  - Ignoring fiber volume fraction differences between groups
- type: fatigue_durability
  evidence_required:
  - S-N fatigue curve across multiple stress levels
  - Stiffness degradation curve over cycles
  - Environmental aging data (hygrothermal, UV) with property retention
  common_risks:
  - Fatigue claim based on a single stress level
  - No stiffness degradation monitoring
  - Extrapolating lab fatigue life to service without environmental factors
coverage_tier: full
cross_references:
  related:
  - thermosets
  - thermoplastics
description:
  engineering_problems:
  - High specific strength and stiffness for lightweight structures
  - Fiber-matrix interface optimization
  - Fatigue and long-term durability under service conditions
  - Manufacturing process optimization (layup, infusion, filament winding)
  summary: Fiber-reinforced polymer composites, including carbon, glass, aramid fiber
    reinforcements in polymer matrices
  typical_applications:
  - Aerospace structures (primary and secondary)
  - Automotive lightweight components
  - Wind turbine blades
  - Civil infrastructure retrofit (CFRP strengthening)
  - Sporting goods
family: polymers
