characterization:
- evidence_tier: definitive
  method: XRD
  purpose: Phase identification, tetragonality (c/a ratio), crystallite size
- evidence_tier: strong
  method: SEM
  purpose: Grain size, density, domain structure (etching)
- evidence_tier: definitive
  method: Impedance Analyzer
  purpose: Dielectric constant, loss tangent, resonance/anti-resonance frequencies
- evidence_tier: strong
  method: P-E Hysteresis (Ferroelectric Tester)
  purpose: Remnant polarization, coercive field, saturation polarization
- evidence_tier: supporting
  method: Raman Spectroscopy
  purpose: Phase transition detection, local structure, oxygen octahedral distortion
claim_types:
- common_risks:
  - Claiming dielectric/piezoelectric improvement without P-E hysteresis data
  - Reporting d33 without specifying measurement mode (quasi-static vs resonance)
  - Omitting frequency dependence of dielectric properties
  - Missing control comparison against baseline composition
  evidence_required:
  - P-E hysteresis loop data (Pr, Ec, Psat)
  - d33 measurement with defined method and poling conditions
  - Frequency-dependent dielectric constant and loss curves
  - Control comparison against baseline composition
  type: performance_improvement
- common_risks:
  - Attributing property change to ferroelectric phase transition without XRD phase
    analysis
  - Over-interpreting domain wall motion from limited TEM evidence
  - Missing Raman spectroscopy confirmation of phase transition
  - Lacking temperature-dependent data to support mechanism
  evidence_required:
  - XRD phase analysis showing tetragonality or phase fraction change
  - Raman spectroscopy evidence of phase transition or octahedral distortion
  - Temperature-dependent property data supporting the mechanism
  type: mechanism_explanation
- common_risks:
  - Claiming temperature stability without variable-temperature dielectric data
  - Omitting Curie temperature measurement
  - Reporting single-temperature performance only
  - Missing thermal stability curves over operating range
  evidence_required:
  - Variable-temperature dielectric constant and loss data
  - Curie temperature measurement (DSC or dielectric vs T)
  - Thermal stability curves over the claimed operating temperature range
  type: temperature_stability
coverage_tier: full
cross_references:
  related:
  - structural-ceramics
  - dielectrics-piezoelectrics
description:
  engineering_problems:
  - Piezoelectric coefficient (d₃₃) optimization via composition and poling
  - Dielectric constant and loss control for capacitor and RF applications
  - Temperature stability of dielectric properties
  - Co-firing compatibility in multilayer devices
  summary: Piezoelectric ceramics (PZT, BaTiO₃, KNN), dielectric/ferroelectric ceramics,
    LTCC, and microwave ceramics
  typical_applications:
  - Piezoelectric actuators and sensors
  - Multilayer ceramic capacitors (MLCCs)
  - Microwave dielectric resonators and filters
  - LTCC substrates for electronic packaging
family: ceramics
figure_archetypes:
- description: XRD patterns showing phase evolution with composition
  id: xrd_pattern
  type: xrd_pattern
  column_roles:
  - angle
  - intensity
  column_map:
    x_values: {"column": "two_theta"}
