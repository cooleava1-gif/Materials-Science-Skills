properties:
- id: dielectric_constant
  name: Dielectric Constant
  test_methods:
  - ASTM D150 / IEC 60250
  typical_range: 10–5000
  unit: dimensionless
- id: loss_tangent
  name: Dielectric Loss (tan δ)
  test_methods:
  - ASTM D150 / IEC 60250
  typical_range: 0.0001–0.05
  unit: dimensionless
- id: piezoelectric_coefficient
  name: Piezoelectric Coefficient (d₃₃)
  test_methods:
  - IEEE Std 176
  typical_range: 10–600
  unit: pC/N
- id: remnant_polarization
  name: Remnant Polarization (Pr)
  test_methods:
  - Sawyer-Tower method
  typical_range: 1–40
  unit: µC/cm²
- id: coercive_field
  name: Coercive Field (Ec)
  test_methods:
  - Sawyer-Tower method
  typical_range: 0.5–5
  unit: kV/mm
