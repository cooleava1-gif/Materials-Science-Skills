  - imaginary
  column_map:
    frequency: {"column": "log_freq_hz"}
    z_real: {"column": "z_real"}
    z_imag: {"column": "z_imag"}
- description: Ferroelectric P-E hysteresis loop showing remnant polarization and
    coercive field
  id: pe_hysteresis
  type: line_plot
  column_roles:
  - electric_field
  - polarization
- description: Ferroelectric phase transition and domain wall motion mechanism diagram
  id: mechanism_diagram
  type: diagram
  column_roles: []
- description: Scatter regression of piezoelectric coefficient d33 versus composition
  id: scatter_regression
  type: scatter
  column_roles:
  - x_values
  - y_values
