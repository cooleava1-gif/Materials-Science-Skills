      column: pure_asphalt
    - key: 5% WER
      column: 5%_wer
    - key: 10% WER
      column: 10%_wer
    - key: 15% WER
      column: 15%_wer
- description: Densification behavior during sintering
  id: sintering_curve
  type: sintering_curve
  column_roles:
  - temperature
  - shrinkage
  column_map:
    x_values: {"column": "temperature"}
    y1_values: {"column": "relative_density_pct"}
    y2_values: {"column": "open_porosity_pct"}
- description: Impedance Nyquist plot showing grain and grain boundary contributions
  id: impedance_nyquist
  type: eis_plot
  column_roles:
