characterization:
- evidence_tier: definitive
  method: TEM/HRTEM
  purpose: Particle size, shape, crystallinity, lattice fringe analysis
- evidence_tier: strong
  key_features:
  - Hydrodynamic diameter and PDI from cumulant analysis
  - Intensity/volume/number distributions for polydispersity assessment
  method: DLS
  purpose: Hydrodynamic diameter and size distribution in suspension
- evidence_tier: strong
  key_features:
  - Scherrer crystallite size from peak broadening
  - Phase identification (FCC Au: 38.2°, 44.4°, 64.6°, 77.6°)
  method: XRD
  purpose: Crystalline phase, Scherrer crystallite size
- evidence_tier: strong
  key_features:
  - SPR peak position correlates with size (Au ~520 nm, Ag ~410 nm)
  - Tauc plot for semiconductor bandgap of quantum dots
  method: UV-Vis
  purpose: Surface plasmon resonance (SPR) peak for metallic NPs, bandgap for QDs
- evidence_tier: strong
  key_features:
  - '|z| > 30 mV generally indicates good colloidal stability'
  - pH and ionic strength dependence of surface charge
  method: Zeta Potential
  purpose: Surface charge and colloidal stability assessment
- evidence_tier: supporting
  key_features:
  - BET specific surface area from N2 adsorption isotherm
  - Pore size distribution from BJH or DFT methods
  method: BET
  purpose: Specific surface area and porosity of nanopowders
claim_types:
- common_risks:
  - Reporting mean size without PDI or replicate count
  - Claiming 'significant' improvement without statistical test
  - Comparing performance across different size regimes without normalization
  evidence_required:
  - Control group comparison (bare vs. functionalized NPs)
  - Quantitative size/performance data with error bars
  - 'Test conditions: precursor concentration, temperature, reaction time'
  type: performance_improvement
- common_risks:
  - Claiming 'growth mechanism confirmed' from size data alone
  - No control over competing explanations (Ostwald ripening vs. coalescence)
  evidence_required:
  - Time-resolved size evolution (DLS/TEM) showing growth kinetics
  - Surface characterization (zeta potential, FTIR) for surface effect evidence
  - XRD evidence of crystallinity and phase purity
  type: mechanism_explanation
- common_risks:
  - Single-condition zeta potential claimed as 'stable'
  - Ignoring ionic strength and pH effects on aggregation
  evidence_required:
  - Zeta potential across pH and ionic strength range
  - DLS size monitoring over time (aging stability)
  - Critical coagulation concentration (CCC) determination
  type: colloidal_stability
- common_risks:
  - In vitro-only toxicity claimed as 'safe for in vivo'
  - Single cell line claimed as 'biocompatible'
  evidence_required:
  - Dose-response cytotoxicity across multiple cell lines
  - ROS generation and membrane integrity assays
  - 'Size- and dose-dependent viability data with IC50'
  type: toxicity_assessment
coverage_tier: full
