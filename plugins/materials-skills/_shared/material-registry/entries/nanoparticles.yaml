properties:
- id: hydrodynamic_diameter
  name: Hydrodynamic Diameter
  test_methods:
  - Dynamic light scattering (ISO 22412)
  typical_range: 5–200
  unit: nm
- id: zeta_potential
  name: Zeta Potential
  test_methods:
  - Electrophoretic light scattering (ISO 13099)
  typical_range: -60 to +60
  unit: mV
- id: specific_surface_area
  name: Specific Surface Area
  test_methods:
  - BET nitrogen adsorption (ASTM E2651)
  typical_range: 10–200
  unit: m²/g
- id: crystallite_size
  name: Crystallite Size
  test_methods:
  - XRD Scherrer equation
  typical_range: 2–50
  unit: nm
- id: bandgap
  name: Bandgap
  test_methods:
  - UV-Vis diffuse reflectance (Tauc plot)
  typical_range: 1.5–4.5
  unit: eV
- id: polydispersity_index
  name: Polydispersity Index
  test_methods:
  - DLS cumulant analysis (ISO 22412)
  typical_range: 0.05–0.5
  unit: PDI
