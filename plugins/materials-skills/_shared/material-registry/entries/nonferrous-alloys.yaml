characterization:
- evidence_tier: strong
  method: SEM/EDS
  purpose: Precipitate analysis, fracture surface, corrosion morphology
- evidence_tier: strong
  method: XRD
  purpose: Phase identification, texture, precipitate identification
- evidence_tier: strong
  method: TEM
  purpose: Precipitate size, distribution, and coherency analysis
- evidence_tier: strong
  method: DSC
  purpose: Precipitation/dissolution events, melting range
claim_types:
- common_risks:
  - Reporting single-condition YS/UTS without a baseline alloy for comparison
  - Comparing properties from different processing or aging conditions as if they were alloy-driven
  - Ignoring anisotropy in wrought or extruded Al and Mg products
  evidence_required:
  - Tensile data (YS, UTS, elongation) per ASTM E8/E8M or ASTM B557 with specimen geometry
  - Control/baseline alloy and processing conditions (heat treatment, deformation route)
  - Replicate measurements with reported variability
  type: performance_improvement
- common_risks:
  - Claiming precipitation strengthening without TEM evidence of precipitate size and density
  - Inferring a strengthening mechanism from hardness alone without microstructural proof
  - Over-interpreting DSC peaks without correlating them to specific phases
  evidence_required:
  - TEM/SEM precipitate analysis (size, distribution, coherency)
  - Hardness evolution curve versus aging time/temperature
  - DSC precipitation/dissolution peaks correlated with phase identification
  type: mechanism_explanation
- common_risks:
  - Reporting corrosion potential without polarization resistance or rate
  - Extrapolating short-term lab tests to long-term service without validation
  - Ignoring galvanic coupling effects in multi-material assemblies
  evidence_required:
  - Electrochemical data (potentiodynamic polarization, EIS) with test electrolyte
  - Salt spray or immersion exposure results with stated duration
  - Corrosion rate (mm/year) or polarization resistance
  type: corrosion_resistance
coverage_tier: full
