characterization:
- evidence_tier: definitive
  method: Unconfined Compression
  purpose: Strength of stabilized soil
- evidence_tier: supporting
  method: SEM
  purpose: Soil particle bonding, grout penetration morphology
claim_types:
- type: stabilization_effectiveness
  evidence_required:
  - Unconfined compressive strength (UCS) data
  - Comparison across different binder dosages
  - Curing age strength development curve
  common_risks:
  - Claiming stabilization success from a single dosage
  - No curing age evolution data
  - Ignoring soil variability and replicate statistics
- type: permeability_control
  evidence_required:
  - Permeability coefficient data per ASTM D5084
  - Grouting effectiveness verification (before/after)
  - Hydraulic conductivity vs. gradient or time curve
  common_risks:
  - Permeability claim from a single measurement
  - No before/after grouting comparison
  - Ignoring anisotropy of soil hydraulic conductivity
- type: mechanical_improvement
  evidence_required:
  - Stress-strain curve under loading
  - Elastic modulus (secant modulus E50)
  - Unconfined compressive strength
  common_risks:
  - Reporting peak strength without stress-strain behavior
  - No modulus data for stiffness claims
  - Comparing soils at different moisture/density states
coverage_tier: full
cross_references:
  parent: civil-generic
description:
  engineering_problems:
  - Soil stabilization and improvement (lime, cement, polymers)
  - Grouting material design for permeability control
  - Geosynthetic reinforcement of soil structures
  summary: Soils, rocks, grouting materials, stabilized earth, and geosynthetics for
    geotechnical engineering
  typical_applications:
  - Embankments and retaining structures
  - Foundation improvement
  - Tunnel grouting and seepage control
family: civil
figure_archetypes:
