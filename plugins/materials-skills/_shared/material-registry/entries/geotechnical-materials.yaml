properties:
- id: unconfined_compressive_strength
  name: Unconfined Compressive Strength (UCS)
  test_methods:
  - ASTM D2166 (soil)
  - ASTM D1633 (soil-cement)
  typical_range: 0.5–10
  unit: MPa
- id: permeability_coefficient
  name: Coefficient of Permeability
  test_methods:
  - ASTM D5084 (flexible wall permeameter)
  typical_range: 1.0e-9–1.0e-5
  unit: cm/s
- id: elastic_modulus
  name: Secant Modulus (E50)
  test_methods:
  - ASTM D2166 / ASTM D2850
  typical_range: 50–500
  unit: MPa
standards:
- purpose: Unconfined compressive strength of cohesive soil
  standard: ASTM D2166
- purpose: Compressive strength of mold soil-cement cylinders
  standard: ASTM D1633
- purpose: Hydraulic conductivity of saturated porous materials using a flexible wall
    permeameter
  standard: ASTM D5084
- purpose: Unconsolidated-undrained triaxial compression test on cohesive soils
  standard: ASTM D2850
