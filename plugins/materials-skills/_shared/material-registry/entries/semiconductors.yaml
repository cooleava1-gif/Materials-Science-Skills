properties:
- id: carrier_concentration
  name: Carrier Concentration
  test_methods:
  - ASTM F76 (Hall effect)
  typical_range: 1e14–1e19
  unit: cm⁻³
- id: carrier_mobility
  name: Carrier Mobility
  test_methods:
  - ASTM F43 (Hall mobility)
  typical_range: 1–10000
  unit: cm²/(V·s)
- id: resistivity
  name: Resistivity
  test_methods:
  - ASTM F76 (four-point probe)
  typical_range: 1e-4–1e6
  unit: Ω·cm
- id: bandgap
  name: Bandgap
  test_methods:
  - UV-Vis Tauc plot
  - Spectroscopic ellipsometry
  typical_range: 0.5–6.0
  unit: eV
- id: sheet_resistance
  name: Sheet Resistance
  test_methods:
  - ASTM F76 (four-point probe)
  typical_range: 1–10000
  unit: Ω/sq
- id: minority_carrier_lifetime
  name: Minority Carrier Lifetime
  test_methods:
  - TRPL (time-resolved photoluminescence)
  typical_range: 0.1–1000
  unit: μs
