characterization:
- evidence_tier: strong
  method: XRD
  purpose: Epitaxial quality, strain, composition (Vegard's law)
- evidence_tier: strong
  method: PL (Photoluminescence)
  purpose: Bandgap, defect states, quantum well emission
- evidence_tier: definitive
  method: Hall Effect
  purpose: Carrier concentration, mobility, resistivity
- evidence_tier: strong
  method: XPS/UPS
  purpose: Surface chemistry, band alignment, work function
- evidence_tier: strong
  method: Four-Point Probe
  purpose: Sheet resistance and resistivity of thin films and wafers
- evidence_tier: supporting
  method: TRPL (Time-Resolved Photoluminescence)
  purpose: Minority carrier lifetime, recombination dynamics
claim_types:
- common_risks:
  - Reporting carrier mobility without Hall effect confirmation
  - Claiming efficiency improvement without I-V characterization under standard illumination
  - Omitting control/baseline comparison for device performance
  evidence_required:
  - Hall effect data (carrier concentration, mobility, resistivity)
  - I-V characteristic curves under defined bias and illumination
  - Control/baseline comparison with reference device or material
  type: performance_improvement
- common_risks:
  - Attributing property change to a defect/dopant without PL or XPS evidence
  - Over-interpreting mechanism from a single characterization technique
  - Missing carrier concentration data to support doping claims
  evidence_required:
  - PL and/or XPS evidence of defect states or dopant incorporation
  - Carrier concentration data (Hall effect) correlated with composition
  - Clear link between defect/dopant and observed property change
  type: mechanism_explanation
- common_risks:
  - Claiming stability without defined aging test protocol
  - Reporting initial performance only without retention rate over time
  - Ignoring bias/temperature stress conditions during aging
  evidence_required:
  - Aging test data under defined stress (temperature, bias, illumination)
  - Performance retention rate over specified duration
  - Failure-mode analysis when degradation is observed
  type: device_stability
coverage_tier: full
cross_references:
  related:
  - photonic-optoelectronic
  - functional-ceramics
description:
  engineering_problems:
  - Bandgap engineering via composition and strain
  - Doping control and carrier mobility optimization
  - Defect passivation and interface quality improvement
  - Device efficiency and stability under operation
  - Wide-bandgap power device reliability (SiC, GaN)
  summary: Elemental and compound semiconductors (Si, GaN, GaAs, SiC, perovskites)
    for electronic and optoelectronic devices
  typical_applications:
  - Integrated circuits and logic devices
  - Power electronics (SiC, GaN)
  - Solar cells and photodetectors
  - Light-emitting diodes (LEDs)
  - RF and microwave devices (GaAs, GaN)
family: functional
figure_archetypes:
- description: X-ray diffraction pattern for phase identification and epitaxial quality
  id: xrd_pattern
  type: xrd_pattern
  column_roles:
  - angle
  - intensity
  column_map:
    x_values:
      column: two_theta
    y_series:
    - key: Bulk Silicon
      column: bulk_silicon
    - key: Nanowire Silicon
      column: nanowire_silicon
- description: Hall mobility trend with uncertainty across annealing temperature
  id: hall_mobility_trend
  type: line_plot
  column_roles:
  - x_values
  - y_values
  column_map:
    x_values:
      column: annealing_temp_C
    y_values:
      column: mobility_cm2_Vs
    y_errors:
      column: mobility_cm2_Vs_std
- description: Cyclic voltammetry curve for electrochemical interface characterization
  id: cv_curve
  type: cv_curve
  column_roles:
  - voltage
  - current
- description: Electrochemical impedance spectroscopy Nyquist plot for carrier transport
  id: eis_nyquist
  type: eis_plot
  column_roles:
  - z_real
  - z_imag
  column_map:
    frequency:
      column: log_freq_hz
    z_real:
      column: z_real
    z_imag:
      column: z_imag
- description: 'Multi-panel semiconductor characterization: mobility + resistivity
    + bandgap'
  id: semiconductor_multipanel
  type: multi_panel
  column_roles:
  - subfigures
- description: Defect and doping mechanism diagram linking microstructure to carrier
    transport
  id: mechanism_diagram
  type: diagram
  column_roles: []
- description: Scatter regression of carrier mobility versus carrier concentration
  id: mobility_vs_concentration
  type: scatter
  column_roles:
  - x_values
  - y_values
