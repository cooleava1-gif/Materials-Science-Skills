characterization:
- evidence_tier: strong
  method: XRD
  purpose: Epitaxial quality, strain, composition (Vegard's law)
- evidence_tier: strong
  method: PL (Photoluminescence)
  purpose: Bandgap, defect states, quantum well emission
- evidence_tier: definitive
  method: Hall Effect
  purpose: Carrier concentration, mobility, resistivity
- evidence_tier: strong
  method: XPS/UPS
  purpose: Surface chemistry, band alignment, work function
coverage_tier: full
cross_references:
  related:
  - photonic-optoelectronic
description:
  engineering_problems:
  - Bandgap engineering via composition and strain
  - Doping control and carrier mobility optimization
  - Defect passivation and interface quality improvement
  - Device efficiency and stability under operation
  summary: Elemental and compound semiconductors (Si, GaN, GaAs, SiC, perovskites)
    for electronic and optoelectronic devices
  typical_applications:
  - Integrated circuits and logic devices
  - Power electronics (SiC, GaN)
  - Solar cells and photodetectors
  - Light-emitting diodes (LEDs)
family: functional
figure_archetypes:
- id: xrd_pattern
  description: X-ray diffraction pattern for phase identification
  required_columns:
  - two_theta
  - bulk_silicon
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/semiconductors_xrd.csv
  column_map:
    x_values:
      column: two_theta
    y_series:
    - key: Bulk Silicon
      column: bulk_silicon
    - key: Nanowire Silicon
      column: nanowire_silicon
- id: trend_curve
  description: Hall mobility trend with uncertainty
  required_columns:
  - annealing_temp_C
  - mobility_cm2_Vs
  - mobility_cm2_Vs_std
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  data_schema: skills/materials-figure/scripts/figures4materials/data/semiconductors_trend_curve.csv
  column_map:
    x_values:
      column: annealing_temp_C
    y_values:
      column: mobility_cm2_Vs
    y_errors:
      column: mobility_cm2_Vs_std
id: semiconductors
name: Semiconductor Materials
narrative:
  arc: Material Growth → Doping/Defect Engineering → Band Structure → Device Performance
    → Stability
  skill_references:
    domain_fragment: skills/materials-research/static/fragments/domain/semiconductors.md
    narrative_guide: skills/materials-writing/references/semiconductors-narrative.md
    reviewer_criteria: skills/materials-reviewer/references/semiconductors-reviewer-criteria.md
skill_mapping:
  data_schemas:
  - skills/materials-figure/scripts/figures4materials/data/semiconductors_xrd.csv
  - skills/materials-figure/scripts/figures4materials/data/semiconductors_trend_curve.csv
  figure_packages:
  - skills/materials-figure/examples/figure-packages/semiconductors-demo
  figure_scripts:
  - skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  - skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
