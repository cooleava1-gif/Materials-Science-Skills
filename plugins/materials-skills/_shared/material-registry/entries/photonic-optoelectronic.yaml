characterization:
- evidence_tier: definitive
  method: UV-Vis Spectroscopy
  purpose: Absorption edge, bandgap determination (Tauc plot)
- evidence_tier: strong
  method: PL/QY
  purpose: Emission spectrum, quantum yield, defect emission
- evidence_tier: definitive
  method: EQE Measurement
  purpose: External quantum efficiency vs. wavelength
- evidence_tier: strong
  method: XRD
  purpose: Crystal structure, thin film orientation
- evidence_tier: strong
  method: I-V Characterization (Solar Simulator)
  purpose: Power conversion efficiency, Voc, Jsc, fill factor
- evidence_tier: supporting
  method: Integrating Sphere
  purpose: Photoluminescence quantum yield, total photon flux
claim_types:
- common_risks:
  - Claiming EQE/PCE improvement without spectral EQE measurement
  - Reporting efficiency without standard solar simulator I-V characterization
  - Omitting integrating sphere calibration for quantum yield
  evidence_required:
  - EQE spectrum across the relevant wavelength range
  - I-V characteristic curves under standard illumination (AM1.5G)
  - Integrating sphere measurement for absolute efficiency/yield
  type: efficiency_improvement
- common_risks:
  - Attributing emission/absorption change without PL spectral evidence
  - Claiming bandgap shift without Tauc plot analysis
  - Ignoring defect-state contribution to non-radiative recombination
  evidence_required:
  - PL spectrum evidence of emission mechanism
  - Bandgap analysis (UV-Vis Tauc plot)
  - Defect-state evidence (PL, transient absorption, or DLTS)
  type: mechanism_explanation
- common_risks:
  - Claiming stability without defined aging test protocol
  - Reporting initial efficiency only without degradation curve
  - Omitting illumination intensity and temperature during aging
  evidence_required:
  - Aging test data under defined illumination and thermal stress
  - Performance degradation curve over specified duration
  - Retention rate of key metrics (PCE, EQE, PLQY) over time
  type: stability_validation
coverage_tier: full
cross_references:
  related:
  - semiconductors
  - functional-ceramics
description:
  engineering_problems:
  - External quantum efficiency optimization in LEDs and solar cells
  - Bandgap engineering for specific spectral response
  - Defect-mediated non-radiative recombination suppression
  - Light extraction and trapping enhancement
  - Long-term operational stability under illumination and heat
  summary: LED materials, solar cell absorbers, photodetectors, nonlinear optical
    materials, and photonic crystals
  typical_applications:
  - Light-emitting diodes (visible, UV, IR)
  - Photovoltaic cells (Si, perovskite, organic, quantum dot)
  - Photodetectors and image sensors
  - Integrated photonic devices
family: functional
figure_archetypes:
- description: X-ray diffraction pattern for crystal structure and thin film orientation
  figure_script: skills/materials-figure/scripts/figures4materials/plot_xrd_pattern.py
  id: xrd_pattern
  type: xrd_pattern
  column_roles:
  - angle
  - intensity
  column_map:
    x_values: {"column": "two_theta"}
    y_series:
    - key: Bulk Perovskite
      column: bulk_perovskite
    - key: Nanocrystal Perovskite
      column: nanocrystal_perovskite
- description: External quantum efficiency trend with uncertainty across wavelength
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  id: eqe_trend
  type: line_plot
  column_roles:
  - wavelength
  - eqe
  column_map:
    x_values: {"column": "wavelength_nm"}
    y_values: {"column": "EQE_percent"}
    y_errors: {"column": "EQE_percent_std"}
- description: UV-Vis absorption spectrum for bandgap determination (Tauc plot)
  figure_script: skills/materials-figure/scripts/figures4materials/plot_errorbar_trend.py
  id: uvis_absorption
  type: line_plot
  column_roles:
  - wavelength
  - absorbance
  column_map:
    x_values: {"column": "wavelength_nm"}
    y_values: {"column": "absorbance"}
- description: 'Multi-panel optoelectronic characterization: EQE + absorption + PL'
  figure_script: skills/materials-figure/scripts/figures4materials/plot_functional_multipanel.py
  id: optoelectronic_multipanel
  type: multi_panel
  column_roles:
  - subfigures
- description: Energy band diagram illustrating absorption, transport and recombination
    mechanisms
  figure_script: skills/materials-figure/scripts/figures4materials/plot_mechanism_diagram.py
  id: band_diagram
  type: diagram
  column_roles: []
- description: Scatter regression of EQE versus absorber thickness
  figure_script: skills/materials-figure/scripts/figures4materials/plot_scatter_regression.py
  id: eqe_vs_thickness
  type: scatter
  column_roles:
  - x_values
  - y_values
- description: Graphical abstract summarizing optoelectronic device design and performance
  figure_script: skills/materials-figure/scripts/figures4materials/plot_graphical_abstract.py
  id: graphical_abstract
  type: diagram
  column_roles: []
