characterization:
- evidence_tier: strong
  method: SEM
  purpose: Pore structure, fiber morphology, aerogel network visualization
- evidence_tier: strong
  method: BET/BJH
  purpose: Specific surface area, pore size distribution of nanoporous insulation
- evidence_tier: supporting
  method: TGA/DTG
  purpose: Thermal stability, organic content, degradation temperature
- evidence_tier: definitive
  method: Hot Disk / Transient Plane Source
  purpose: Thermal conductivity and diffusivity measurement
claim_types:
- common_risks:
  - Reporting conductivity at room T only for high-T application
  - Ignoring humidity effect on conductivity
  evidence_required:
  - Thermal conductivity measured under specified conditions (T, RH)
  - Comparison with commercial/standard insulation
  - Density and porosity data
  type: performance_improvement
- common_risks:
  - No aging data at all
  - Hydrophobic claim without water contact angle or moisture uptake data
  evidence_required:
  - Aged/hygrothermal conditioned thermal performance
  - Mechanical property retention after aging
  type: durability_validation
coverage_tier: partial
cross_references:
  parent: civil-generic
  related:
  - sustainability-durability
  - civil-generic
description:
  engineering_problems:
  - Building envelope thermal performance and energy efficiency
  - High-temperature industrial insulation
  - Fire resistance and thermal barrier performance
  - Moisture/hygrothermal behavior of insulation systems
  - Mechanical properties of lightweight porous materials
  summary: Aerogels, foams, fibrous insulation, vacuum insulation panels, and related
    thermal management materials
  typical_applications:
  - Building insulation (walls, roofs, floors)
  - Industrial pipe and equipment insulation
  - Cryogenic insulation
  - Fireproofing and thermal barrier coatings
family: civil
