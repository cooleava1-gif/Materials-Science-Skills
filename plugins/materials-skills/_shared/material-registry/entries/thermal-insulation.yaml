properties:
- id: thermal_conductivity
  name: Thermal Conductivity
  test_methods:
  - ASTM C518 (heat flow meter)
  - ASTM C177 (guarded hot plate)
  - ISO 8301
  typical_range: 0.015–0.080
  unit: W/(m·K)
- id: density
  name: Density
  test_methods:
  - ASTM C303 / EN 1602
  typical_range: 10–500
  unit: kg/m³
- id: compressive_strength
  name: Compressive Strength
  test_methods:
  - ASTM C165 / EN 826
  typical_range: 10–500
  unit: kPa
- id: thermal_diffusivity
  name: Thermal Diffusivity
  test_methods:
  - ASTM E1461 (laser flash)
  typical_range: 0.1–1.0
  unit: mm²/s
