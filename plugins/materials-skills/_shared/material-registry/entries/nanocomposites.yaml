characterization:
- evidence_tier: definitive
  key_features:
  - Individual filler dispersion and exfoliation degree (layered fillers)
  - Interphase thickness and filler-matrix interface imaging
  method: TEM
  purpose: Filler dispersion, exfoliation degree (for layered fillers), interphase
- evidence_tier: strong
  key_features:
  - Fracture surface filler distribution at micro-scale
  - Agglomeration and pull-out evidence for interface quality
  method: SEM
  purpose: Fracture surface, filler distribution at micro-scale
- evidence_tier: strong
  key_features:
  - Storage modulus upturn indicating percolation network formation
  - Complex viscosity scaling for dispersion and percolation threshold
  method: Rheology
  purpose: Melt rheology for dispersion assessment (percolation threshold)
- evidence_tier: strong
  key_features:
  - Storage modulus enhancement in rubbery plateau
  - Tg shift indicating filler-matrix interaction strength
  method: DMA
  purpose: Storage modulus enhancement, Tg shift, filler-matrix interaction
- evidence_tier: supporting
  key_features:
  - Filler peak intensity for loading quantification
  - Interlayer spacing change for exfoliation/intercalation assessment
  method: XRD
  purpose: Phase identification, intercalation/exfoliation, filler crystallinity
claim_types:
- common_risks:
  - Reporting strength without elongation or modulus trade-off
  - Claiming 'significant enhancement' without statistical test
  - Comparing across different matrix or processing conditions
  evidence_required:
  - Control group comparison (neat matrix vs. nanocomposite)
  - Quantitative mechanical data with error bars across loadings
  - 'Test conditions: filler loading, dispersion method, processing parameters'
  type: performance_improvement
- common_risks:
  - Claiming 'load transfer confirmed' from modulus data alone
  - No control over competing explanations (volume fraction vs. interface)
  evidence_required:
  - Stress-strain data with modulus enhancement quantification
  - TEM/SEM evidence of interface and filler orientation
  - DMA evidence of constrained polymer fraction (Tg shift)
  type: mechanism_explanation
- common_risks:
  - Low-magnification SEM claimed as 'well dispersed'
  - No quantitative dispersion metric (e.g., inter-particle distance)
  evidence_required:
  - TEM/SEM image analysis with dispersion statistics (area fraction, agglomerate
    size)
  - Rheological evidence of percolation or network formation
  - 'Dispersion parameters: mixing method, time, shear rate'
  type: dispersion_quality
- common_risks:
  - Single-loading data claimed as 'percolation threshold'
  - No rheological or conductivity transition evidence
  evidence_required:
  - Loading-dependent property curve showing sigmoidal transition
  - Rheological percolation (storage modulus vs. loading) or electrical percolation
    (conductivity vs. loading)
  - 'Fitted percolation threshold with confidence interval'
  type: percolation_analysis
coverage_tier: full
cross_references:
  related:
