  typical_range: 20–150
  unit: MPa
- id: youngs_modulus
  name: Young's Modulus
  test_methods:
  - Tensile test (ASTM D638)
  typical_range: 0.5–15
  unit: GPa
- id: elongation_break
  name: Elongation at Break
  test_methods:
  - Tensile test (ASTM D638)
  typical_range: 2–300
  unit: '%'
- id: percolation_threshold
  name: Percolation Threshold
  test_methods:
  - Rheological percolation (ASTM D4065)
  - Electrical conductivity vs. loading
  typical_range: 0.1–10
  unit: wt%
- id: storage_modulus
  name: Storage Modulus
  test_methods:
  - Dynamic mechanical analysis (ASTM D4065)
  typical_range: 100–10000
  unit: MPa
- id: glass_transition_temp
  name: Glass Transition Temperature
  test_methods:
  - DMA tan δ peak (ASTM D4065)
  - DSC midpoint (ISO 11357)
  typical_range: -100 to 250
  unit: °C
