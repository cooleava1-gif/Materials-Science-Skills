- purpose: Life cycle assessment requirements and guidelines
  standard: ISO 14044
- purpose: Resistance of concrete to rapid freezing and thawing
  standard: ASTM C666
- purpose: Determining the apparent chloride diffusion coefficient of cementitious
    mixtures by bulk diffusion
  standard: ASTM C1556
- purpose: Half-cell potential for uncoated reinforcing steel in concrete (corrosion
    and carbonation indication)
  standard: ASTM C876
