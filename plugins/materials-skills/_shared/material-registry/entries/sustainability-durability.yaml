characterization:
- evidence_tier: definitive
  method: LCA
  purpose: Environmental impact quantification (cradle-to-gate, cradle-to-grave)
- evidence_tier: strong
  method: Accelerated Durability Testing
  purpose: Freeze-thaw, carbonation, chloride ingress, alkali-silica reaction
claim_types:
- type: sustainability_assessment
  evidence_required:
  - LCA data (GWP, embodied energy) per ISO 14040/14044
  - System boundary condition statement (cradle-to-gate, etc.)
  - Comparison baseline (reference material or process)
  common_risks:
  - Claiming 'green' or 'low-carbon' without LCA data
  - No defined functional unit or system boundary
  - Cherry-picked impact categories without full disclosure
- type: durability_prediction
  evidence_required:
  - Freeze-thaw cycle data with strength retention
  - Carbonation depth measurement
  - Chloride penetration (diffusion coefficient) data
  - Performance degradation model with time
  common_risks:
  - Durability prediction from a single degradation mechanism
  - No service-life model linking lab data to field exposure
  - Ignoring coupled degradation (e.g. freeze-thaw plus chloride)
- type: waste_valorization
  evidence_required:
  - Waste dosage vs. performance curve
  - Leaching toxicity data for heavy metals or organics
  - Compatibility evidence with the host matrix
  common_risks:
  - Valorization claim based on strength alone
  - No leaching/toxicity assessment
  - Ignoring adverse effects on durability or workability
coverage_tier: full
cross_references:
  related:
  - cement-concrete
  - asphalt-pavement
description:
  engineering_problems:
  - CO₂ reduction in cement and concrete production
  - Waste material valorization in construction (slag, fly ash, recycled aggregate,
    rubber)
  - Long-term durability prediction under coupled degradation mechanisms
  - Service-life extension via material modification
  summary: Life cycle assessment, carbon footprint, durability prediction, recycled/waste
    materials, and service-life modeling
  typical_applications:
  - Low-carbon concrete and cement
  - Recycled aggregate concrete
  - Waste-modified asphalt and pavement materials
  - Durability-based design for infrastructure
family: civil
