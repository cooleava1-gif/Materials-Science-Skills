characterization:
- evidence_tier: definitive
  method: Mechanical Testing
  purpose: Load-deformation, mechanical strength evaluation
- evidence_tier: strong
  method: SEM
  purpose: Microstructure, pore morphology analysis
claim_types:
- type: performance_improvement
  evidence_required:
  - Strength data with control comparison
  - Replicate statistics (SD or COV)
  - Code or specification compliance verification
  common_risks:
  - Claiming improvement without a control group
  - No replicate statistics for strength claims
  - Ignoring curing or conditioning differences
- type: quality_control
  evidence_required:
  - Coefficient of variation (COV) across batches
  - Statistical distribution of measured properties
  - Compliance with specification limits
  common_risks:
  - Quality claim from a single batch
  - No statistical distribution reported
  - Comparing against unspecified acceptance limits
- type: material_selection
  evidence_required:
  - Multi-property comparison across candidate materials
  - Cost-effectiveness analysis
  - Suitability justification for the target application
  common_risks:
  - Selection based on a single property
  - No cost or availability consideration
  - Ignoring durability or service conditions
coverage_tier: full
cross_references:
