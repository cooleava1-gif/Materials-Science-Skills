journal_id: ceramics-international
full_name: Ceramics International
publisher: elsevier
official_class: elsarticle.cls
document_class_line: "\\documentclass[review,numbered]{elsarticle}"
official_template_url: https://www.sciencedirect.com/journal/ceramics-international/publish/guide-for-authors
submission_portal: https://www.editorialmanager.com/CERINT/
article_types:
  - id: research-article
    submission_label: Research Article
    word_limit: "no strict cap; verify current Guide for Authors"
    abstract_words: 200
    abstract_structure: unstructured
    references: "no hard cap"
  - id: review-article
    submission_label: Review Article
    word_limit: "verify current Guide for Authors"
    abstract_words: "verify current Guide for Authors"
    abstract_structure: unstructured
    references: "comprehensive"
required_fields:
  - title
  - abstract
  - keywords
  - authors
  - affiliations
  - corresponding_author
  - declarations
declaration_requirements:
  data_availability: true
  credit_author_statement: true
  conflict_of_interest: true
  funding: true
  ethics: conditional
cover_letter_required_points:
  - "What the finding is (one sentence)"
  - "What is novel about it (one sentence)"
  - "Why it matters to the ceramics community (one sentence)"
highlights_required: false
highlights_rules:
  min_count: 0
  max_count: 0
  max_characters_per_item: 0
required_artifacts:
  - id: graphical-abstract
    label: Graphical abstract
    stage: initial-submission
    required: recommended
live_verification_fields:
  - word_limit
  - abstract_words
  - references_cap
  - apc_rate
  - submission_portal_url
