journal_id: cbm
full_name: Construction and Building Materials
publisher: elsevier
official_class: elsarticle.cls
document_class_line: "\\documentclass[review,numbered]{elsarticle}"
official_template_url: https://www.elsevier.com/journals/construction-and-building-materials/0950-0618/guide-for-authors
submission_portal: https://www.editorialmanager.com/CONBIL/
article_types:
  - id: research-article
    word_limit: "6000-10000 (no strict cap)"
    abstract_words: 250
    abstract_structure: structured
    references: "50-80 typical"
  - id: review-article
    word_limit: "8000-15000"
    abstract_words: 300
    abstract_structure: unstructured
    references: "100+"
  - id: short-communication
    word_limit: 3000
    abstract_words: 150
    abstract_structure: structured
    references: 20
required_fields:
  - title
  - abstract
  - keywords
  - authors
  - affiliations
  - corresponding_author
  - declarations
declaration_requirements:
  data_availability: true
  credit_author_statement: true
  conflict_of_interest: true
  funding: true
  ethics: conditional
cover_letter_required_points:
  - "What the finding is (one sentence)"
  - "What is novel about it (one sentence)"
  - "Why it matters to the construction materials community (one sentence)"
highlights_required: true
highlights_rules:
  min_count: 3
  max_count: 5
  max_characters_per_item: 85
live_verification_fields:
  - word_limit
  - abstract_words
  - references_cap
  - apc_rate
  - submission_portal_url
