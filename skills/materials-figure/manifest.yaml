version: "2.0.0"

always_load:
  - static/core/contract.md
  - ../_shared/core/direction-profile.md
  - static/core/figure-contract.md
  - static/core/stance.md
  - static/core/workflow.md
  - ../_shared/paper-production/weakness-routing.md

axes:
  backend:
    default: python
    detect: |
      Python-only plotting gate. All figure drawing, previewing, exporting, and
      visual QA must use the Python backend. Before rendering, check Python and
      required plotting packages. If the runtime or packages are unavailable,
      stop and report the blocker instead of substituting another backend.
    values:
      python:
        path: static/fragments/backend/python.md
        triggers: ["Python", "matplotlib", "seaborn", "plot.py", "pyplot", ".py", "figure", "plot", "chart"]

  figure_type:
    default: performance
    values:
      performance:
        path: references/performance-figures.md
        triggers: ["strength", "bonding", "viscosity", "performance", "强度", "粘结", "黏度"]
      durability:
        path: references/durability-figures.md
        triggers: ["retention", "water", "aging", "freeze", "durability", "耐久", "水损害", "老化"]
      mechanism:
        path: references/mechanism-figures.md
        triggers: ["mechanism", "curing", "interface", "机制", "机理", "界面"]
      characterization:
        path: references/characterization-figures.md
        triggers: ["FTIR", "XRD", "TG", "DTG", "SEM", "TEM", "fluorescence", "rheology", "表征", "显微", "光谱", "热重"]
      summary:
        path: references/summary-figures.md
        triggers: ["radar", "matrix", "summary", "trade-off", "综合评价"]
      gallery:
        path: references/figure-gallery.md
        triggers: ["gallery", "figure gallery", "figure example", "style preset", "demo figure", "figure card", "图表示例"]
      production-spec:
        path: references/figure-production-spec.md
        triggers: ["dpi", "TIFF", "EPS", "PDF", "figure production", "submission figure", "分辨率", "投稿图", "出图规范"]
      wer-ea-review:
        path: references/wer-ea-review-figure-contract.md
        triggers: ["WER-EA", "figure contract", "mechanism map", "evidence heatmap", "material-system map", "performance-mechanism boundary", "literature-screening flow", "graphical abstract"]
      wer-ea-atlas:
        path: references/wer-ea-figure-atlas.md
        triggers: ["WER-EA atlas", "figure atlas", "WER-EA figure library", "mechanism map library", "evidence heatmap library", "dosage window library", "durability map library", "review figure asset library"]
      figure-package:
        path: references/figure-package-protocol.md
        triggers: ["figure package", "figure_contract.md", "qa_report.md", "asset_manifest.md", "journal-ready package", "图包"]

  handoff_intake:
    default: none
    values:
      review-figure:
        path: references/review-figure-intake.md
        triggers: ["reader handoff", "citation matrix", "review figure intake", "figure handoff", "evidence heatmap", "mechanism map", "certainty_tier", "caption_boundary"]
      none:
        path: references/figure-package-protocol.md
        triggers: ["direct plotting", "source_data.csv", "plot.py"]

  material_family:
    detect: "Which materials family is central?"
    default: neutral
    values:
      neutral:
        path: ../_shared/core/direction-profile.md
        triggers: ["neutral family", "profile family fallback", "no saved family"]
      civil:
        path: ../materials-research/static/fragments/domain/civil-family.md
        triggers: ["civil", "construction", "building", "pavement", "土木", "建筑"]
      polymers:
        path: ../materials-research/static/fragments/domain/polymers-family.md
        triggers: ["polymer", "resin", "rubber", "epoxy", "高分子", "聚合物", "树脂"]
      metals:
        path: ../materials-research/static/fragments/domain/metals-family.md
        triggers: ["metal", "alloy", "steel", "aluminum", "金属", "合金", "钢"]
      ceramics:
        path: ../materials-research/static/fragments/domain/ceramics-family.md
        triggers: ["ceramic", "porcelain", "refractory", "陶瓷", "耐火"]
      functional:
        path: ../materials-research/static/fragments/domain/functional-family.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "半导体", "介电", "压电"]
      nano:
        path: ../materials-research/static/fragments/domain/nano-family.md
        triggers: ["nano", "nanoparticle", "2D material", "纳米", "纳米材料"]

  domain:
    detect: "Which material domain does the figure target?"
    default: general
    values:
      general:
        path: ../_shared/core/direction-profile.md
        triggers: ["general fallback", "profile fallback", "neutral routing"]
      civil:
        path: static/fragments/domain/civil.md
        triggers: ["civil", "asphalt", "cement", "concrete", "pavement", "土木", "建筑", "道路"]
      polymers:
        path: static/fragments/domain/polymers.md
        triggers: ["polymer", "resin", "rubber", "thermoplastic", "高分子"]
      ceramics:
        path: static/fragments/domain/ceramics.md
        triggers: ["ceramic", "sintering", "alumina", "zirconia", "carbide", "陶瓷"]
      metals:
        path: static/fragments/domain/metals.md
        triggers: ["metal", "alloy", "steel", "金属"]
      functional:
        path: static/fragments/domain/functional.md
        triggers: ["semiconductor", "dielectric", "piezoelectric", "optoelectronic", "半导体"]
      nano:
        path: static/fragments/domain/nano.md
        triggers: ["nano", "nanoparticle", "2D material", "graphene", "纳米"]
      thermal-insulation:
        path: static/fragments/domain/thermal-insulation.md
        triggers: ["thermal insulation", "aerogel", "foam", "insulation", "隔热"]

references:
  on_demand:
    - condition: user provides CSV/TSV experimental data and asks for automatic plotting, one-click figure generation, chart recommendation, SVG/PNG export, or QA report
      path: references/automatic-figure-package.md
    - condition: create a complete figure package or audit a package
      path: references/figure-package-protocol.md
    - condition: before final delivery, journal-ready package, microscopy image plate, or statistics-heavy figure
      path: references/figure-qa-contract.md
    - condition: production export, DPI, TIFF/EPS/PDF, final size, font size, scale bars
      path: references/figure-production-spec.md
    - condition: WER-EA review figures, mechanism map, evidence heatmap, dosage-window figure, or graphical abstract
      path: references/wer-ea-review-figure-contract.md
    - condition: WER-EA figure atlas, reusable review-figure library, atlas data templates, or generated SVG/PNG examples
      path: references/wer-ea-figure-atlas.md
    - condition: ceramics review figures, Weibull plots, sintering curves, XRD patterns, or impedance spectra
      path: references/ceramics-review-figure-contract.md
    - condition: ceramics figure atlas, sintering-Weibull-XRD-conductivity figure library, or atlas data templates
      path: references/ceramics-figure-atlas.md
    - condition: polymer figures, thermoplastic/thermoset/rubber/composite plots, or polymer processing figure packages
      path: references/polymers-figure-package.md
    - condition: metals figures, alloy/steel/aluminum/titanium/welding/heat-treatment plots, or metals figure packages
      path: references/metals-figure-package.md
    - condition: functional materials figures, semiconductor/dielectric/piezoelectric/photonic plots, or functional figure packages
      path: references/functional-figure-package.md
    - condition: nanomaterials figures, nanoparticle/nanotube/graphene/2D material plots, or nano figure packages
      path: references/nano-figure-package.md
    - condition: review-figure intake from reader handoff rows, citation matrices, figure handoff CSVs, mechanism maps, or evidence heatmaps
      path: references/review-figure-intake.md
    - condition: chart families, visual hierarchy, and materials plotting recipes
      path: references/chart-atlas.md
    - condition: review-first visual inspiration and paper-derived patterns
      path: references/paper-derived-visual-patterns.md
    - condition: design theory and visual communication principles
      path: references/figure-design-theory.md
    - condition: end-to-end figure tutorials, step-by-step plotting walkthroughs, or how-to examples for common materials charts
      path: references/tutorials.md
    - condition: paper demo reference for production-quality figures
      path: references/paper-demo-reference.md
    - condition: visual asset roadmap and asset production guide
      path: references/visual-asset-roadmap.md
    - condition: table system templates for comparison matrices
      path: references/table-system.md
    - condition: fixed materials figure archetypes, process-structure-property mapping, mechanism evidence chains, durability aging, comparison windows, or review evidence maps
      path: references/materials-figure-atlas.md
    - condition: multi-panel storyboard planning, A-F panel narrative order, 2x2, 2x3, or graphical abstract composition
      path: assets/templates/figure_storyboard.yaml
    - condition: caption claims, panel-level evidence limits, or caption boundary audit
      path: references/caption_boundary.md
    - condition: figure QA, font, font size, legend, units, resolution, or editable SVG text checks
      path: references/figure_qa_report.md
assets:
  - assets
scripts:
  - scripts
  - scripts/data_diagnose.py
  - scripts/recommend_chart.py
  - scripts/generate_figure_package.py
tests:
  - tests
quality_gates:
  - release gate must report no issues for this skill
  - claims must stay inside the skill evidence contract
handoffs:
  provides:
    figure-handoff:
      description: "Figure planning and evidence mapping"
      contract: ../../_shared/contracts/figure-handoff.yaml
      version: "1.0"
  consumes:
    - handoff: citation-handoff
      from: materials-citation
      optional: true
    - handoff: reader-package
      from: materials-reader
      optional: true
    - handoff: data-package
      from: materials-data
      optional: true
release_checks:
  - scripts/run_release_checks.py --json
  - scripts/check_skill_architecture.py --json
